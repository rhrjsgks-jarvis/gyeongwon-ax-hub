<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제품별 설치환경 가이드</title>
<style>
:root {
  --primary:#0891B2; --primary-l:#ECFEFF; --primary-m:#A5F3FC;
  --navy:#1428A0; --navy-l:#EEF2FF;
  --green:#16a34a; --green-l:#dcfce7;
  --yellow:#b45309; --yellow-l:#fef3c7;
  --red:#dc2626; --red-l:#fee2e2;
  --text:#1a1a2e; --gray:#6b7280; --border:#e5e7eb;
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard Variable',Pretendard,-apple-system,sans-serif;background:#f8f9fb;color:var(--text);min-height:100vh;}

header{background:var(--navy);color:#fff;padding:16px 20px;display:flex;align-items:center;gap:12px;}
header .icon{font-size:22px;}
header h1{font-size:17px;font-weight:700;letter-spacing:-.3px;}
header p{font-size:11.5px;opacity:.7;margin-top:2px;}

main{padding:18px 16px;max-width:620px;margin:0 auto;}
.card{background:#fff;border-radius:var(--radius);border:1.5px solid var(--border);padding:18px;margin-bottom:14px;}
.card-title{font-size:12px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;}

.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px;}
.cat-btn{background:var(--primary-l);border:1.5px solid var(--primary-m);border-radius:10px;padding:10px 6px;font-size:12px;font-weight:600;color:var(--primary);cursor:pointer;text-align:center;transition:all .15s;line-height:1.5;}
.cat-btn:hover,.cat-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.cat-btn .ci{font-size:18px;display:block;margin-bottom:3px;}

#result{display:none;}
#result.visible{display:block;}

.result-header{background:linear-gradient(135deg,var(--navy) 0%,#1e40af 100%);color:#fff;border-radius:12px;padding:16px;margin-bottom:14px;}
.result-header h2{font-size:16px;font-weight:800;margin-bottom:4px;}
.result-header p{font-size:12px;opacity:.85;line-height:1.5;}

.na-card{background:#fff8f0;border:1.5px solid #fed7aa;border-radius:12px;padding:16px;margin-bottom:14px;font-size:13px;color:#7c2d12;line-height:1.6;}

.sec-title{font-size:13px;font-weight:800;color:var(--navy);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.spec-table{width:100%;border-collapse:collapse;font-size:12.5px;margin-bottom:4px;}
.spec-table th{background:#f8f9fb;padding:9px 10px;font-size:11.5px;font-weight:700;color:var(--gray);text-align:left;border-bottom:2px solid var(--border);width:38%;}
.spec-table td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.55;}
.spec-table tr:last-child td, .spec-table tr:last-child th{border-bottom:none;}

.type-chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.type-chip{background:var(--navy-l);color:var(--navy);border-radius:20px;padding:4px 12px;font-size:11.5px;font-weight:700;}

.check-list{list-style:none;}
.check-item{display:flex;gap:8px;margin-bottom:9px;font-size:12.5px;line-height:1.6;align-items:flex-start;}
.check-item:last-child{margin-bottom:0;}
.check-ico{flex-shrink:0;font-size:14px;margin-top:1px;}

.caution-card{background:#fff8f0;border:1.5px solid #fed7aa;border-radius:12px;padding:14px;margin-bottom:14px;}
.caution-card h3{font-size:13px;font-weight:800;color:#c2410c;margin-bottom:10px;}
.caution-item{display:flex;gap:8px;margin-bottom:7px;font-size:12.5px;align-items:flex-start;line-height:1.55;}
.caution-item:last-child{margin-bottom:0;}
.caution-icon{flex-shrink:0;font-size:14px;}

.source-box{background:#f8f9fb;border-radius:10px;padding:12px 14px;font-size:11.5px;color:var(--gray);line-height:1.6;margin-bottom:14px;}
.source-box b{color:var(--text);}

.action-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;}
.act-btn{border:none;border-radius:10px;padding:12px 6px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;text-align:center;}
.act-btn.copy{background:var(--navy);color:#fff;}
.act-btn.kakao{background:#FEE500;color:#3A1D1D;}
.act-btn:hover{opacity:.85;transform:translateY(-1px);}

.disclaimer{background:#f0f9ff;border-left:3px solid #38bdf8;border-radius:0 8px 8px 0;padding:10px 12px;font-size:11.5px;color:#0c4a6e;line-height:1.6;margin-top:14px;}

footer{text-align:center;padding:22px 20px;font-size:11.5px;color:#9ca3af;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a2e;color:#fff;border-radius:10px;padding:10px 20px;font-size:13px;font-weight:600;z-index:9999;transition:transform .3s ease;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<header>
  <div class="icon">🛠️</div>
  <div>
    <h1>제품별 설치환경 가이드</h1>

  </div>
</header>

<main>

  <div class="card">
    <div class="card-title">① 카테고리 선택</div>
    <div class="cat-grid">
      <button class="cat-btn" onclick="selectCat('냉장고')"><span class="ci">🧊</span>냉장고</button>
      <button class="cat-btn" onclick="selectCat('세탁기·콤보')"><span class="ci">🫧</span>세탁기·콤보</button>
      <button class="cat-btn" onclick="selectCat('에어컨')"><span class="ci">❄️</span>에어컨</button>
      <button class="cat-btn" onclick="selectCat('TV')"><span class="ci">📺</span>TV</button>
      <button class="cat-btn" onclick="selectCat('청소기')"><span class="ci">💨</span>무선청소기</button>
      <button class="cat-btn" onclick="selectCat('로봇청소기')"><span class="ci">🤖</span>로봇청소기</button>
      <button class="cat-btn" onclick="selectCat('스마트폰')"><span class="ci">📱</span>스마트폰</button>
      <button class="cat-btn" onclick="selectCat('건조기')"><span class="ci">🌀</span>건조기</button>
      <button class="cat-btn" onclick="selectCat('식기세척기')"><span class="ci">🍽️</span>식기세척기</button>
      <button class="cat-btn" onclick="selectCat('노트북')"><span class="ci">💻</span>노트북</button>
    </div>
  </div>

  <div id="result">
    <div class="result-header">
      <h2 id="res-title">설치환경 안내</h2>
      <p id="res-subtitle"></p>
    </div>

    <div id="na-wrap"></div>

    <div id="main-content">
      <div class="card">
        <div class="sec-title">📐 설치 유형·공간 요건</div>
        <div class="type-chip-row" id="type-chips"></div>
        <table class="spec-table" id="space-table"></table>
      </div>

      <div class="card">
        <div class="sec-title">🔌 전기·급배수 요건</div>
        <table class="spec-table" id="utility-table"></table>
      </div>

      <div class="card">
        <div class="sec-title">✅ 설치 전 확인 체크리스트</div>
        <ul class="check-list" id="check-list"></ul>
      </div>

      <div id="caution-wrap"></div>

      <div class="source-box" id="source-box"></div>

      <div class="action-row">
        <button class="act-btn copy" onclick="copyChecklist()">📋 체크리스트 복사</button>
        <button class="act-btn kakao" onclick="shareChecklist()">💬 카카오 공유</button>
      </div>

      <div class="disclaimer">💡 실제 설치 가능 여부는 현장 환경(진입로·전기·급배수·바닥 상태 등)에 따라 달라질 수 있으며, 최종 확정은 삼성전자 로지텍 방문 실측 후 안내됩니다. 정확한 견적·상담은 삼성전자서비스(1588-3366)로 문의하세요.</div>
    </div>
  </div>

</main>

<footer>경원 AX 허브 · 제품별 설치환경 가이드 · 경원영업팀</footer>
<div class="toast" id="toast"></div>

let currentCat = null;

function selectCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active', b.textContent.trim()===cat));
  const d = INSTALL_DB[cat];
  document.getElementById('res-title').textContent = `${d ? d.emoji : ''} ${cat} 설치환경`;

  if (!d || d.notApplicable) {
    document.getElementById('res-subtitle').textContent = '설치 공간 규격이 적용되지 않는 제품군입니다';
    document.getElementById('main-content').style.display = 'none';
    document.getElementById('na-wrap').innerHTML = `<div class="na-card">📱 ${cat}은(는) 벽면·배관·전기 등 물리적 설치 공간 요건이 적용되지 않는 휴대·개인용 제품군입니다. 별도의 설치환경 확인이 필요하지 않습니다.</div>`;
  } else {
    document.getElementById('na-wrap').innerHTML = '';
    document.getElementById('main-content').style.display = 'block';
    document.getElementById('res-subtitle').textContent = d.subtitle || '';

    document.getElementById('type-chips').innerHTML = (d.types||[]).map(t=>`<span class="type-chip">${t}</span>`).join('');
    document.getElementById('space-table').innerHTML = (d.space||[]).map(r=>`<tr><th>${r[0]}</th><td>${r[1]}</td></tr>`).join('');
    document.getElementById('utility-table').innerHTML = (d.utility||[]).map(r=>`<tr><th>${r[0]}</th><td>${r[1]}</td></tr>`).join('');
    document.getElementById('check-list').innerHTML = (d.checklist||[]).map(c=>`<li class="check-item"><span class="check-ico">☑️</span><span>${c}</span></li>`).join('');

    const cautions = d.cautions || [];
    document.getElementById('caution-wrap').innerHTML = cautions.length ? `
      <div class="caution-card">
        <h3>⚠️ 설치 불가·주의 사항</h3>
        ${cautions.map(c=>`<div class="caution-item"><span class="caution-icon">⚠️</span><span>${c}</span></div>`).join('')}
      </div>` : '';

    document.getElementById('source-box').innerHTML = `<b>출처</b> · ${d.source}`;
  }

  document.getElementById('result').classList.add('visible');
  document.getElementById('result').scrollIntoView({behavior:'smooth',block:'start'});
}

function buildChecklistText() {
  const d = INSTALL_DB[currentCat];
  if (!d || d.notApplicable) return '';
  const lines = [
    `[제품별 설치환경 가이드] ${d.emoji} ${currentCat}`,
    d.subtitle || '',
    `━━━━━━━━━━━━━━━━━━━━━`,
    `【설치 유형】`,
    (d.types||[]).join(' · '),
    ``,
    `【공간 요건】`,
    ...(d.space||[]).map(r=>`- ${r[0]}: ${r[1]}`),
    ``,
    `【전기·급배수 요건】`,
    ...(d.utility||[]).map(r=>`- ${r[0]}: ${r[1]}`),
    ``,
    `【설치 전 체크리스트】`,
    ...(d.checklist||[]).map(c=>`☑ ${c}`),
    ``,
    `【설치 불가·주의사항】`,
    ...(d.cautions||[]).map(c=>`⚠ ${c}`),
    `━━━━━━━━━━━━━━━━━━━━━`,
    `출처: ${d.source}`,
    `경원 AX 허브 · 제품별 설치환경 가이드`
  ];
  return lines.filter(l=>l!==undefined).join('\n');
}

function copyChecklist() {
  const text = buildChecklistText();
  if (!text) { toast('먼저 카테고리를 선택하세요.'); return; }
  navigator.clipboard.writeText(text).then(()=>toast('📋 체크리스트 복사 완료!'));
}

function shareChecklist() {
  const text = buildChecklistText();
  if (!text) { toast('먼저 카테고리를 선택하세요.'); return; }
  if (navigator.share) {
    navigator.share({ title:'제품별 설치환경 가이드', text }).catch(()=>{});
  } else {
    navigator.clipboard.writeText(text).then(()=>toast('📋 복사 완료! 카카오톡에 붙여넣기 해주세요.'));
  }
}

function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
</script>
