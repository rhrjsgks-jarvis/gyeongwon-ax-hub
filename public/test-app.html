<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SAMSUNG STORE 레벨업 챌린지 2026</title>
<style>
:root{--blue:#1428A0;--blue-dark:#0c1b6b;--blue-light:#EEF1FB;--correct:#1a7f4b;--correct-bg:#E6F4EC;--wrong:#C0392B;--wrong-bg:#FDECEA;--warn:#d97706;--border:#E2E8F0}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;background:#F4F6FB;color:#222;min-height:100vh}
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(140deg,#0c1b6b 0%,var(--blue) 60%,#2a4fcc 100%);padding:24px 16px}
.login-card{background:#fff;border-radius:24px;padding:40px 32px;max-width:460px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.brand-badge{display:inline-block;background:var(--blue);color:#fff;font-size:12px;font-weight:700;letter-spacing:3px;padding:6px 16px;border-radius:4px;margin-bottom:20px}
.login-title{font-size:26px;font-weight:800;color:var(--blue);line-height:1.3;margin-bottom:6px}
.login-sub{font-size:13px;color:#888;margin-bottom:24px}
.info-chips{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px}
.info-chip{background:var(--blue-light);color:var(--blue);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:700}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:13px;font-weight:600;color:#555;margin-bottom:8px}
.form-input{width:100%;padding:14px 16px;font-size:16px;border:2px solid var(--border);border-radius:12px;outline:none;transition:border .2s}
.form-input:focus{border-color:var(--blue)}
.form-err{font-size:12px;color:#e53e3e;margin-top:6px;min-height:16px}
.start-btn{width:100%;margin-top:8px;background:var(--blue);color:#fff;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:700;cursor:pointer;transition:background .2s,transform .1s;letter-spacing:.5px}
.start-btn:hover{background:var(--blue-dark)}
.start-btn:active{transform:scale(.98)}
#quizHeader{position:sticky;top:0;z-index:100;background:var(--blue);color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 10px rgba(20,40,160,.4)}
.h-left .h-title{font-size:14px;font-weight:700}
.h-left .h-prog{font-size:12px;opacity:.8;margin-top:2px}
#timer{font-size:20px;font-weight:800;font-variant-numeric:tabular-nums;background:rgba(255,255,255,.15);padding:6px 16px;border-radius:8px;min-width:90px;text-align:center;transition:background .3s}
#timer.warn{background:rgba(251,191,36,.35);color:#FDE68A}
#timer.danger{background:rgba(220,38,38,.4);color:#FCA5A5;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
#quizContent{max-width:740px;margin:0 auto;padding:24px 16px 120px}
.q-card{background:#fff;border-radius:16px;padding:26px 22px;margin-bottom:20px;box-shadow:0 2px 12px rgba(20,40,160,.07);border:2px solid transparent;transition:border-color .2s}
.q-card.answered{border-color:var(--blue)}
.q-meta{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.q-num{background:var(--blue);color:#fff;font-size:11px;font-weight:700;letter-spacing:.5px;padding:3px 10px;border-radius:20px}
.q-cat{background:var(--blue-light);color:var(--blue);font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.q-cat.essay-cat{background:#FFF7ED;color:#C2410C}
.q-text{font-size:15px;font-weight:700;line-height:1.65;color:#111;margin-bottom:18px}
.options{display:flex;flex-direction:column;gap:9px}
.opt-btn{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border:2px solid var(--border);border-radius:10px;background:#fff;cursor:pointer;font-size:14px;color:#333;line-height:1.5;transition:all .15s;text-align:left;width:100%}
.opt-btn:hover{border-color:var(--blue);background:var(--blue-light);color:var(--blue)}
.opt-btn.selected{border-color:var(--blue);background:var(--blue-light);color:var(--blue);font-weight:600}
.opt-btn.correct{border-color:var(--correct);background:var(--correct-bg);color:var(--correct);font-weight:600}
.opt-btn.wrong{border-color:var(--wrong);background:var(--wrong-bg);color:var(--wrong);font-weight:600}
.opt-btn:disabled{cursor:default}
.opt-circle{min-width:26px;height:26px;border-radius:50%;background:#F1F5F9;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#888;flex-shrink:0;transition:all .15s}
.opt-btn.selected .opt-circle{background:var(--blue);border-color:var(--blue);color:#fff}
.opt-btn.correct .opt-circle{background:var(--correct);border-color:var(--correct);color:#fff}
.opt-btn.wrong .opt-circle{background:var(--wrong);border-color:var(--wrong);color:#fff}
.essay-textarea{width:100%;padding:14px 16px;border:2px solid var(--border);border-radius:10px;font-size:14px;line-height:1.7;resize:vertical;outline:none;transition:border .2s;font-family:inherit}
.essay-textarea:focus{border-color:var(--blue)}
.essay-count{text-align:right;font-size:12px;color:#aaa;margin-top:6px}
#submitWrap{position:fixed;bottom:0;left:0;right:0;background:rgba(244,246,251,.95);backdrop-filter:blur(8px);padding:12px 20px;border-top:1px solid var(--border);display:none}
#submitWrap.visible{display:block}
#submitBtn{max-width:740px;width:100%;margin:0 auto;display:block;background:var(--blue);color:#fff;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.5px}
#submitBtn:disabled{background:#B0BEC5;cursor:not-allowed}
#submitBtn:not(:disabled):hover{background:var(--blue-dark)}
#resultScreen{max-width:740px;margin:0 auto;padding:24px 16px 60px;display:none}
.res-header{background:linear-gradient(135deg,var(--blue-dark),var(--blue));color:#fff;border-radius:20px;padding:32px 28px;text-align:center;margin-bottom:20px}
.res-brand{font-size:11px;letter-spacing:3px;opacity:.7;margin-bottom:8px}
.res-title{font-size:18px;font-weight:700;margin-bottom:6px}
.res-meta-info{font-size:13px;opacity:.75;line-height:1.7}
.score-card{background:#fff;border-radius:20px;padding:32px 24px;text-align:center;box-shadow:0 4px 20px rgba(20,40,160,.1);margin-bottom:16px}
.score-main{font-size:60px;font-weight:900;color:var(--blue);line-height:1}
.score-main span{font-size:22px;color:#aaa;font-weight:400}
.score-pct{font-size:24px;font-weight:700;color:#555;margin-top:4px;margin-bottom:16px}
.score-grade{display:inline-block;font-size:17px;font-weight:700;padding:10px 24px;border-radius:30px;margin-bottom:24px}
.grade-s{background:#DBEAFE;color:var(--blue)}
.grade-a{background:var(--correct-bg);color:var(--correct)}
.grade-b{background:#FEF3C7;color:#92400E}
.grade-c{background:var(--wrong-bg);color:var(--wrong)}
.score-breakdown{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.score-box{flex:1;min-width:130px;max-width:200px;background:var(--blue-light);border-radius:12px;padding:14px;text-align:center}
.score-box-label{font-size:11px;color:#666;margin-bottom:6px}
.score-box-val{font-size:24px;font-weight:800;color:var(--blue)}
.score-box-max{font-size:13px;color:#999}
.drive-status{background:#fff;border-radius:12px;padding:14px 20px;margin-bottom:16px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06);font-size:14px;font-weight:600}
.drive-saving{color:#888}.drive-ok{color:var(--correct)}.drive-err{color:var(--wrong)}.drive-skip{color:var(--warn)}
.wrong-section{background:#fff;border-radius:16px;padding:24px;margin-bottom:16px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.wrong-section h3{font-size:16px;font-weight:700;color:#111;margin-bottom:18px;padding-bottom:14px;border-bottom:2px solid #f3f4f6}
.wrong-item{margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid #f3f4f6}
.wrong-item:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.wrong-qnum{font-size:11px;font-weight:700;color:var(--blue);margin-bottom:6px}
.wrong-q{font-size:14px;font-weight:700;color:#222;margin-bottom:12px;line-height:1.55}
.wrong-my{font-size:13px;color:var(--wrong);margin-bottom:4px}
.wrong-correct{font-size:13px;color:var(--correct);margin-bottom:8px;font-weight:600}
.wrong-exp{font-size:12px;color:#555;background:#F8FAFF;border-left:3px solid var(--blue);padding:10px 14px;border-radius:0 8px 8px 0;line-height:1.7}
.all-correct{background:var(--correct-bg);border-radius:16px;padding:32px;text-align:center;font-size:18px;font-weight:700;color:var(--correct);margin-bottom:16px}
.essay-review{background:#fff;border-radius:16px;padding:24px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.essay-review h3{font-size:15px;font-weight:700;color:#111;margin-bottom:14px}
.essay-review p{font-size:14px;color:#444;line-height:1.8;white-space:pre-wrap;background:#F8FAFF;padding:16px;border-radius:10px}
button,.opt-btn,.start-btn,#submitBtn{-webkit-tap-highlight-color:transparent;touch-action:manipulation}
input{-webkit-tap-highlight-color:transparent}
#submitWrap{padding-bottom:calc(12px + env(safe-area-inset-bottom))}
#quizContent{padding-bottom:calc(120px + env(safe-area-inset-bottom))}
#modalOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;align-items:center;justify-content:center;padding:20px}
#modalOverlay.active{display:flex}
.modal-box{background:#fff;border-radius:20px;padding:32px 24px;max-width:340px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-msg{font-size:15px;font-weight:600;color:#222;line-height:1.7;margin-bottom:24px;white-space:pre-line}
.modal-btns{display:flex;gap:10px}
.modal-cancel{flex:1;padding:13px;border:2px solid #e2e8f0;border-radius:10px;background:#fff;font-size:15px;font-weight:600;cursor:pointer;color:#555;touch-action:manipulation}
.modal-ok{flex:1;padding:13px;border:none;border-radius:10px;background:#1428A0;color:#fff;font-size:15px;font-weight:700;cursor:pointer;touch-action:manipulation}
@media(max-width:600px){.login-card{padding:28px 18px}.login-title{font-size:21px}.q-text{font-size:14px}.opt-btn{padding:12px 14px;font-size:13px}.q-card{padding:20px 16px}#quizHeader{padding:10px 14px}#timer{font-size:17px;padding:5px 12px;min-width:76px}.score-main{font-size:46px}.score-box{min-width:110px}.wrong-exp{font-size:12px}.res-header{padding:24px 20px}}

.mode-select{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.mode-option{display:flex;align-items:center;gap:10px;padding:11px 14px;border:2px solid var(--border);border-radius:12px;cursor:pointer;transition:border .2s,background .2s;user-select:none}
.mode-option:has(input:checked){border-color:#1428A0;background:#f0f3ff}
.mode-option input[type=radio]{accent-color:#1428A0;width:18px;height:18px;flex-shrink:0}
.mode-label{font-size:14px;font-weight:700;color:#222}
.mode-desc{font-size:11px;color:#888;margin-left:auto}
</style>
</head>
<body>
<div id="loginScreen">
  <div class="login-card">
    <div class="brand-badge">SAMSUNG STORE</div>
    <div class="login-title">레벨업 챌린지</div>
    <div class="login-sub">2026 삼성 제품 전문가 성장 프로그램</div>
    <div class="info-chips">
      <span class="info-chip">📋 총 25문항</span>
      <span class="info-chip">⏱ 30분</span>
      <span class="info-chip">📺 CE · 📱 MX · 🏠 Smart</span>
      <span class="info-chip">문제은행 574문항</span>
    </div>
    <div class="form-group">
      <label>시험 유형</label>
      <div class="mode-select">
        <label class="mode-option" for="modeCeMx">
          <input type="radio" id="modeCeMx" name="testMode" value="cemx" checked>
          <span class="mode-label">📺 CE + 📱 MX 통합</span>
          <span class="mode-desc">CE 16 + MX 8문항</span>
        </label>
        <label class="mode-option" for="modeCe">
          <input type="radio" id="modeCe" name="testMode" value="ce">
          <span class="mode-label">📺 CE 시험</span>
          <span class="mode-desc">CE 전체 풀 24문항</span>
        </label>
        <label class="mode-option" for="modeMx">
          <input type="radio" id="modeMx" name="testMode" value="mx">
          <span class="mode-label">📱 MX 시험</span>
          <span class="mode-desc">MX 전체 풀 24문항</span>
        </label>
      </div>
    </div>
    <div class="form-group">
      <label>지점명</label>
      <input id="empId" class="form-input" type="text" placeholder="수원점">
      <div class="form-err" id="empErr"></div>
    </div>
    <div class="form-group">
      <label>이름</label>
      <input id="empName" class="form-input" type="text" placeholder="홍길동">
      <div class="form-err" id="nameErr"></div>
    </div>
    <button class="start-btn" onclick="startQuiz()">시험 시작하기 →</button>
  </div>
</div>
<div id="quizScreen" style="display:none">
  <header id="quizHeader">
    <div class="h-left">
      <div class="h-title">레벨업 챌린지</div>
      <div class="h-prog" id="progressText">0 / 24 답변 완료</div>
    </div>
    <div id="timer">30:00</div>
  </header>
  <div id="quizContent"></div>
  <div id="submitWrap">
    <button id="submitBtn" disabled onclick="handleSubmit()">모든 문항 답변 후 제출 가능합니다</button>
  </div>
</div>
<div id="resultScreen"></div>
<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbwxNcwFNDvN2bA1U2SB6PlY89M8X8Aq1NZ5VUPzSB1arE0LIJVGll6K4zlBPi0HuaI/exec';
const QB={
"TV": [
{
"q": "삼성 Micro RGB RH95에 적용된 기술로 알맞지 않은 것은?",
"opts": [
"Micro RGB AI 엔진 Pro",
"Micro RGB Precision Color 100",
"오토 캘리브레이션(Auto Calibration)",
"무반사(Glare Free) 기술"
],
"ans": 2,
"exp": "오토 캘리브레이션은 LG TV의 기능입니다. 삼성 Micro RGB RH95는 Micro RGB AI 엔진 Pro, Micro RGB Precision Color 100(VDE 인증), UL 인증 무반사 기술을 탑재합니다."
},
{
"q": "삼성 Micro RGB AI 엔진 Pro의 NPU 성능은 26년형 Neo QLED 4K 대비 최대 몇 배 빠른가?",
"opts": [
"최대 1.5배",
"최대 2배",
"최대 3배",
"최대 4.2배"
],
"ans": 1,
"exp": "삼성 Micro RGB AI 엔진 Pro는 26년형 Neo QLED 4K 대비 NPU 최대 2배, GPU 최대 4.2배, CPU 최대 67% 빠릅니다. GPU(4.2배)와 혼동하지 않도록 주의하세요."
},
{
"q": "삼성 Micro RGB RH95의 Micro RGB Precision Color 100 인증 기관과 기준 표준으로 올바른 것은?",
"opts": [
"UL · BT.709",
"VDE · BT.709",
"VDE · BT.2020",
"팬톤 · BT.2020"
],
"ans": 2,
"exp": "ITU가 제정한 UHD 컬러 표준 BT.2020 기준으로 VDE(독일 품질인증기관) 인증을 획득했습니다. UL은 Glare Free 인증 기관입니다."
},
{
"q": "삼성 Micro RGB RH95의 '4K AI 업스케일링 Pro'에 활용되는 AI 뉴럴 네트워크 수는?",
"opts": [
"64개",
"96개",
"128개",
"256개"
],
"ans": 2,
"exp": "Micro RGB AI 엔진 Pro는 128개의 AI 뉴럴 네트워크를 활용해 다양한 콘텐츠를 4K에 가까운 해상도로 정교하게 보정합니다."
},
{
"q": "삼성 Micro RGB RH95의 'AI 사운드 컨트롤 Pro'가 분리하는 오디오 트랙 구성은?",
"opts": [
"음성/배경음악 — 2트랙",
"음성/배경음악/효과음 — 3트랙",
"음성/배경음악/효과음/저음 — 4트랙",
"자동 최적화만 지원"
],
"ans": 1,
"exp": "AI 사운드 컨트롤 Pro는 음성·배경음악·효과음 3가지 트랙으로 분리하며, 각 트랙 볼륨을 개별 조절할 수 있습니다."
},
{
"q": "삼성 Micro RGB RH95의 무반사(Glare Free) 기술 인증 기관은?",
"opts": [
"VDE",
"UL (UL Solutions)",
"ITU",
"팬톤"
],
"ans": 1,
"exp": "Glare Free는 UL(UL Solutions)로부터 인증받은 명칭이며, UGR 테스트 기준에 따라 실내 표준조명 조건에서 측정·인증되었습니다."
},
{
"q": "삼성 Micro RGB RH95가 VRR 게임 실행 시 지원하는 최대 주사율은?",
"opts": [
"4K @ 120Hz",
"4K @ 144Hz",
"4K @ 165Hz",
"4K @ 240Hz"
],
"ans": 2,
"exp": "삼성의 독자적인 모션 터보 165Hz 기술이 적용되어 VRR 게임 실행 시 최대 4K 165Hz 주사율을 구현합니다(PC 연결 게임 기준)."
},
{
"q": "삼성 Micro RGB RH95의 팬톤(Pantone) 인증 내용으로 올바른 것은?",
"opts": [
"1,000가지 팬톤 컬러·50가지 피부톤",
"1,500가지 팬톤 컬러·80가지 피부톤",
"2,140가지 팬톤 컬러·110가지 피부톤",
"3,000가지 팬톤 컬러·150가지 피부톤"
],
"ans": 2,
"exp": "삼성 TV는 2,140가지 팬톤 컬러와 110가지 피부 톤 표현력을 팬톤으로부터 공식 인증받았습니다(HDR 화면 기준)."
},
{
"q": "삼성 Micro RGB RH95의 One UI Tizen OS 업그레이드 최대 지원 기간은?",
"opts": [
"최대 3년",
"최대 5년",
"최대 7년",
"최대 10년"
],
"ans": 2,
"exp": "삼성 Micro RGB RH95는 One UI Tizen OS 업그레이드를 2026년 출시 기준 최대 7년간 지원합니다. 장기간 최신 앱·서비스 이용이 가능합니다."
},
{
"q": "삼성 Micro RGB RH95의 사운드 기술로 알맞지 않은 것은?",
"opts": [
"Dolby Atmos 서라운드 사운드",
"Q 심포니",
"무빙 사운드+ OTS+ (4.2.2ch)",
"webOS 사운드 AI"
],
"ans": 3,
"exp": "webOS 사운드 AI는 LG TV의 기술입니다. 삼성 Micro RGB RH95는 Dolby Atmos, Q 심포니, 무빙 사운드+(OTS+, 4.2.2ch)를 탑재합니다."
},
{
"q": "삼성 Neo QLED와 일반 QLED의 가장 큰 기술적 차이점은?",
"opts": [
"OLED vs LCD 패널 방식 차이",
"미니 LED 백라이트 vs 일반 LED 백라이트",
"해상도(4K vs 8K) 차이",
"프로세서 세대 차이"

const CE_CORE=['TV','냉장고','에어컨','세탁기'];
const CE_BONUS=['건조기','식기세척기','에어드레서','청소기','공기청정기','김치냉장고','인덕션/전기레인지','전자레인지/오븐','사운드바'];
const MX_CORE=['휴대폰','웨어러블'];
const MX_BONUS=['갤럭시탭','갤럭시북','갤럭시링','SmartThings'];
const ALL_CE=[...CE_CORE,...CE_BONUS];
const ALL_MX=[...MX_CORE,...MX_BONUS];

let st={empId:'',name:'',mode:'cemx',questions:[],answers:{},essay:'',timerSec:1800,timerInterval:null,startTime:null,submitted:false};

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function pickN(arr,n){return shuffle(arr||[]).slice(0,n)}
function prepareQ(q,cat){const order=shuffle([0,1,2,3]);return{...q,cat,shuffledOpts:order.map(i=>q.opts[i]),shuffledAns:order.indexOf(q.ans)}}

function startQuiz(){
  const id=document.getElementById('empId').value.trim();
  const nm=document.getElementById('empName').value.trim();
  document.getElementById('empErr').textContent='';
  document.getElementById('nameErr').textContent='';
  if(!id){document.getElementById('empErr').textContent='지점명을 입력해주세요.';return}
  if(!nm){document.getElementById('nameErr').textContent='이름을 입력해주세요.';return}
  const mode=document.querySelector('input[name="testMode"]:checked').value;
  st.empId=id;st.name=nm;st.mode=mode;

  let qs;
  if(mode==='ce'){
    /* CE 전체 풀 24문항 */
    const cePool=ALL_CE.flatMap(cat=>(QB[cat]||[]).map(q=>prepareQ(q,cat)));
    qs=shuffle(pickN(cePool,24));
  }else if(mode==='mx'){
    /* MX 전체 풀 24문항 */
    const mxPool=ALL_MX.flatMap(cat=>(QB[cat]||[]).map(q=>prepareQ(q,cat)));
    qs=shuffle(pickN(mxPool,24));
  }else{
    /* CE+MX: CE 전체 풀 16문항 + MX 전체 풀 8문항 */
    const cePool=ALL_CE.flatMap(cat=>(QB[cat]||[]).map(q=>prepareQ(q,cat)));
    const mxPool=ALL_MX.flatMap(cat=>(QB[cat]||[]).map(q=>prepareQ(q,cat)));
    qs=shuffle([...pickN(cePool,16),...pickN(mxPool,8)]);
  }
  st.questions=qs;
  st.startTime=Date.now();

  document.getElementById('loginScreen').style.display='none';
  document.getElementById('quizScreen').style.display='block';
  document.getElementById('submitWrap').classList.add('visible');
  renderQuiz();startTimer();
}

function renderQuiz(){
  const content=document.getElementById('quizContent');
  const LABELS=['①','②','③','④'];
  let html='';
  st.questions.forEach((q,qi)=>{
    const isCE=[...CE_CORE,...CE_BONUS].includes(q.cat);
    html+=`<div class="q-card" id="qcard-${qi}">
      <div class="q-meta"><span class="q-num">Q${qi+1}</span><span class="q-cat">${isCE?'CE':'MX'} · ${q.cat}</span></div>
      <div class="q-text">${q.q}</div>
      <div class="options">${q.shuffledOpts.map((opt,oi)=>`<button class="opt-btn" id="opt-${qi}-${oi}" onclick="selectOpt(${qi},${oi})"><span class="opt-circle">${LABELS[oi]}</span><span>${opt}</span></button>`).join('')}</div>
    </div>`;
  });
  html+=`<div class="q-card"><div class="q-meta"><span class="q-num">Q25</span><span class="q-cat essay-cat">주관식</span></div>
    <div class="q-text">AI를 활용하여 현장에서 사용경험 또는 AI활용하여 현장에서 사용했으면 하는 기능을 서술하시오.</div>
    <textarea id="essayInput" class="essay-textarea" rows="8" maxlength="1000" placeholder="내용을 입력해주세요. (최대 1,000자)"></textarea>
    <div class="essay-count"><span id="essayCount">0</span> / 1,000자</div></div>`;
  content.innerHTML=html;
  document.getElementById('essayInput').addEventListener('input',function(){st.essay=this.value;document.getElementById('essayCount').textContent=this.value.length});
}

function selectOpt(qi,oi){
  if(st.submitted)return;
  const prev=st.answers[qi];
  if(prev!==undefined){document.getElementById(`opt-${qi}-${prev}`).classList.remove('selected');document.getElementById(`qcard-${qi}`).classList.remove('answered')}
  st.answers[qi]=oi;
  document.getElementById(`opt-${qi}-${oi}`).classList.add('selected');
  document.getElementById(`qcard-${qi}`).classList.add('answered');
  updateProgress();
}

function updateProgress(){
  const done=Object.keys(st.answers).length;
  document.getElementById('progressText').textContent=`${done} / 24 답변 완료`;
  const btn=document.getElementById('submitBtn');
  if(done>=24){btn.disabled=false;btn.textContent='제출하기'}
  else{btn.disabled=true;btn.textContent=`모든 문항 답변 후 제출 가능합니다 (${done}/24)`}
}

function startTimer(){
  updateTimerDisplay();
  st.timerInterval=setInterval(()=>{st.timerSec--;updateTimerDisplay();if(st.timerSec<=0){clearInterval(st.timerInterval);handleSubmit(true)}},1000);
}

function updateTimerDisplay(){
  const m=Math.floor(st.timerSec/60),s=st.timerSec%60;
  const el=document.getElementById('timer');
  el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.className='';
  if(st.timerSec<=300)el.className='danger';
  else if(st.timerSec<=600)el.className='warn';
}

async function handleSubmit(forced=false){
  if(st.submitted)return;
  if(!forced&&Object.keys(st.answers).length<24)return;
  if(!forced){const u=24-Object.keys(st.answers).length;if(u>0){const ok=await showModal(`아직 ${u}문항에 답변하지 않았습니다.\n그대로 제출하시겠습니까?`);if(!ok)return}}
  st.submitted=true;clearInterval(st.timerInterval);
  const elapsed=Date.now()-st.startTime;
  const em=Math.floor(elapsed/60000),es=Math.floor((elapsed%60000)/1000);
  let ceScore=0,mxScore=0;
  const results=st.questions.map((q,qi)=>{
    const chosen=st.answers[qi];
    const correct=(chosen===q.shuffledAns);
    const isCE=[...CE_CORE,...CE_BONUS].includes(q.cat);
    if(correct){if(isCE)ceScore++;else mxScore++}
    return{q,qi,chosen,correct,isCE};
  });
  const essayScore=st.essay&&st.essay.trim()?4:0;
  showResults(results,ceScore,mxScore,essayScore,em,es);
  const totalScore=(st.mode==='ce')?ceScore*4+essayScore:(st.mode==='mx')?mxScore*4+essayScore:ceScore*4+mxScore*4+essayScore;
  saveToGoogle({timestamp:new Date().toLocaleString('ko-KR'),branchName:st.empId,name:st.name,mode:st.mode||'cemx',ceScore:ceScore*4,mxScore:mxScore*4,essayScore,totalScore,timeTaken:`${em}분 ${es}초`,essay:st.essay});
}

function escHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function showResults(results,ceScore,mxScore,essayScore,em,es){
  document.getElementById('quizScreen').style.display='none';
  const rs=document.getElementById('resultScreen');rs.style.display='block';
  const total=(st.mode==='ce')?ceScore*4+essayScore:(st.mode==='mx')?mxScore*4+essayScore:ceScore*4+mxScore*4+essayScore;
  let gradeMsg,gradeClass;
  if(total>=90){gradeMsg='S등급 — 완벽한 제품 전문가!';gradeClass='grade-s'}
  else if(total>=75){gradeMsg='A등급 — 우수합니다!';gradeClass='grade-a'}
  else if(total>=60){gradeMsg='B등급 — 양호합니다. 조금 더 학습하세요!';gradeClass='grade-b'}
  else{gradeMsg='C등급 — 더 학습이 필요합니다.';gradeClass='grade-c'}
  const now=new Date();
  const dateStr=`${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
  const wrongResults=results.filter(r=>!r.correct);
  rs.innerHTML=`
  <div class="res-header"><div class="res-brand">SAMSUNG STORE</div><div class="res-title">레벨업 챌린지 결과</div><div class="res-meta-info">${escHtml(st.name)} (${escHtml(st.empId)})<br>${dateStr} · 소요시간 ${em}분 ${es}초</div></div>
  <div class="score-card">
    <div class="score-main">${total}<span>/100</span></div>
    <div class="score-pct">${total}점</div>
    <div class="score-grade ${gradeClass}">${gradeMsg}</div>
    <div class="score-breakdown">
      ${st.mode==='ce'?`<div class="score-box"><div class="score-box-label">가전 CE (24문항)</div><div class="score-box-val">${ceScore*4}</div><div class="score-box-max">/ 96점</div></div>`:st.mode==='mx'?`<div class="score-box"><div class="score-box-label">MX/Smart (24문항)</div><div class="score-box-val">${mxScore*4}</div><div class="score-box-max">/ 96점</div></div>`:`<div class="score-box"><div class="score-box-label">가전 CE (16문항)</div><div class="score-box-val">${ceScore*4}</div><div class="score-box-max">/ 64점</div></div><div class="score-box"><div class="score-box-label">MX/Smart (8문항)</div><div class="score-box-val">${mxScore*4}</div><div class="score-box-max">/ 32점</div></div>`}
      <div class="score-box"><div class="score-box-label">AI활용서술 (Q25)</div><div class="score-box-val">${essayScore}</div><div class="score-box-max">/ 4점</div></div>
    </div>
  </div>
  <div class="drive-status" id="driveStatus"><span class="drive-saving">저장 중...</span></div>
  ${wrongResults.length>0?`<div class="wrong-section"><h3>오답 풀이 (${wrongResults.length}문항 오답)</h3>${wrongResults.map(r=>`<div class="wrong-item"><div class="wrong-qnum">Q${r.qi+1} · ${r.isCE?'CE':'MX'} · ${r.q.cat}</div><div class="wrong-q">${r.q.q}</div><div class="wrong-my">내 답변: ${r.chosen!==undefined?r.q.shuffledOpts[r.chosen]:'(미응답)'}</div><div class="wrong-correct">정답: ${r.q.shuffledOpts[r.q.shuffledAns]}</div><div class="wrong-exp">${r.q.exp}</div></div>`).join('')}</div>`:`<div class="all-correct">객관식 24문항 전부 정답! 완벽한 제품 전문가입니다.</div>`}
  <div class="essay-review"><h3>AI 활용 서술 (Q25)</h3><p>${escHtml(st.essay||'(미작성)')}</p></div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}

function saveToGoogle(data){
  if(!SCRIPT_URL){document.getElementById('driveStatus').innerHTML='<span class="drive-skip">Google Apps Script URL 미설정</span>';return}
  const iframeName='gs_'+Date.now();
  const iframe=document.createElement('iframe');iframe.name=iframeName;iframe.style.display='none';document.body.appendChild(iframe);
  const form=document.createElement('form');form.method='POST';form.action=SCRIPT_URL;form.target=iframeName;
  const input=document.createElement('input');input.type='hidden';input.name='data';input.value=JSON.stringify(data);
  form.appendChild(input);document.body.appendChild(form);
  const el=document.getElementById('driveStatus');
  let settled=false;
  const cleanup=()=>{if(form.parentNode)document.body.removeChild(form);if(iframe.parentNode)document.body.removeChild(iframe)};
  iframe.addEventListener('load',()=>{
    if(settled)return; settled=true;
    if(el)el.innerHTML='<span class="drive-ok">Google Drive에 저장되었습니다!</span>';
    cleanup();
  });
  iframe.addEventListener('error',()=>{
    if(settled)return; settled=true;
    if(el)el.innerHTML='<span class="drive-skip">저장 실패 — 네트워크 연결을 확인하세요</span>';
    cleanup();
  });
  setTimeout(()=>{
    if(settled)return; settled=true;
    if(el)el.innerHTML='<span class="drive-skip">저장 확인 시간 초과 — 네트워크 연결을 확인하세요</span>';
    cleanup();
  },10000);
  form.submit();
}

let _modalCb=null;
function showModal(msg){return new Promise(resolve=>{_modalCb=resolve;document.getElementById('modalMsg').textContent=msg;document.getElementById('modalOverlay').classList.add('active')})}
function closeModal(val){document.getElementById('modalOverlay').classList.remove('active');if(_modalCb){_modalCb(val);_modalCb=null}}
document.getElementById('empId').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('empName').focus()});
document.getElementById('empName').addEventListener('keydown',e=>{if(e.key==='Enter')startQuiz()});
</script>
<div id="modalOverlay"><div class="modal-box"><p id="modalMsg" class="modal-msg"></p><div class="modal-btns"><button class="modal-cancel" onclick="closeModal(false)">취소</button><button class="modal-ok" onclick="closeModal(true)">제출하기</button></div></div></div>
</body></html>
