<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>모델 파인더 — 키워드 제품 추천</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{
  --bg:#EDF2F9; --surface:#FFFFFF; --ink:#0E1C30; --sub:#5C6C82; --line:#D8E1EE;
  --blue:#1428A0; --blue-soft:#E4E9FB; --deep:#0B1F3A; --cyan:#0090C8; --cyan-soft:#E0F3FA;
  --good:#0E8A5F; --good-soft:#E3F4ED; --bad:#D6452C; --bad-soft:#FBEAE6; --amber:#9A6B00; --amber-soft:#FBF3DC;
  --mono:'JetBrains Mono','SF Mono','Consolas',monospace;
  --sans:'Pretendard Variable',Pretendard,-apple-system,'Noto Sans KR',sans-serif;
  --r:14px; --shadow:0 1px 2px rgba(14,28,48,.05),0 6px 18px rgba(14,28,48,.06);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.55;min-height:100vh}
.wrap{max-width:780px;margin:0 auto;padding:0 16px 80px}
button{font-family:var(--sans);cursor:pointer;border:none;background:none;color:inherit}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

.topbar{position:sticky;top:0;z-index:50;background:var(--deep);color:#fff}
.topbar-in{max-width:780px;margin:0 auto;padding:13px 16px;display:flex;align-items:center;gap:10px}
.brand{flex:1;min-width:0}
.brand b{font-size:16px;font-weight:800;letter-spacing:-.02em;display:block}
.brand span{font-size:11px;color:#9FB4D4;letter-spacing:.04em}
.mode{display:flex;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:10px;padding:3px}
.mode button{font-size:12px;font-weight:700;padding:6px 11px;border-radius:7px;color:#A9BBD8;white-space:nowrap}
.mode button.on{background:#fff;color:var(--deep)}

/* 검색 히어로 */
.shero{padding:24px 2px 6px}
.shero .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--cyan);font-weight:700}
.shero h1{font-size:24px;font-weight:800;letter-spacing:-.03em;margin:6px 0 4px}
.shero p{color:var(--sub);font-size:13px}
.searchbox{display:flex;gap:8px;margin:15px 0 11px}
.searchbox .field{flex:1;position:relative}
.searchbox input,.searchbox textarea{width:100%;font-family:var(--sans);font-size:15.5px;font-weight:600;
  padding:15px 16px;border-radius:var(--r);border:2px solid var(--line);background:var(--surface);color:var(--ink);
  box-shadow:var(--shadow)}
.searchbox textarea{resize:none;height:84px;font-weight:500;line-height:1.5}
.searchbox input:focus,.searchbox textarea:focus{outline:none;border-color:var(--blue)}
.searchbox .go{background:var(--blue);color:#fff;font-size:14.5px;font-weight:800;padding:0 20px;border-radius:var(--r);
  box-shadow:var(--shadow);align-self:stretch}
.searchbox .go:active{background:#101F7E}
.exrow{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:6px}
.ex{font-size:12px;font-weight:600;color:var(--blue);background:var(--blue-soft);padding:6px 12px;border-radius:99px}
.ex:active{background:#D3DBF7}
.aihint{font-size:11.5px;color:var(--sub);margin:-2px 0 8px}

/* 해석 결과 바 */
.parsebar{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin:4px 0 12px;min-height:0}
.ptag{font-size:11.5px;font-weight:700;padding:5px 11px;border-radius:8px;background:var(--cyan-soft);color:var(--cyan)}
.ptag.fil{background:var(--amber-soft);color:var(--amber)}
.ptag.cat{background:var(--deep);color:#fff}
.rescount{font-size:12px;color:var(--sub);font-weight:600;margin-left:auto}

/* 결과 목록 */
.sortrow{display:flex;gap:6px;overflow-x:auto;padding:2px 2px 12px;scrollbar-width:none}
.sortrow::-webkit-scrollbar{display:none}
.sbtn{flex:0 0 auto;font-size:12px;font-weight:700;padding:7px 12px;border-radius:99px;background:var(--surface);
  border:1px solid var(--line);color:var(--sub)}
.sbtn.on{background:var(--deep);border-color:var(--deep);color:#fff}
.rlist{display:flex;flex-direction:column;gap:10px}
.rcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.rmain{width:100%;text-align:left;padding:14px 16px 12px;display:block}
.rtop{display:flex;align-items:baseline;gap:8px}
.rcat{font-size:10.5px;font-weight:800;letter-spacing:.09em;color:var(--cyan)}
.rnew{font-size:9.5px;font-weight:800;color:#fff;background:var(--blue);padding:2px 7px;border-radius:5px;letter-spacing:.05em}
.rrank{margin-left:auto;font-family:var(--mono);font-size:10.5px;color:#A6B4C8;font-weight:700}
.rname{font-size:15px;font-weight:800;letter-spacing:-.02em;margin:4px 0 0}
.rcode{font-family:var(--mono);font-size:12px;color:var(--blue);font-weight:700}
.rmeta{display:flex;flex-wrap:wrap;gap:9px;margin-top:7px;font-size:12px;color:var(--sub)}
.rmeta b{color:var(--ink);font-weight:800;font-size:13px}
.rwhy{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
.why{font-size:10.5px;font-weight:700;color:var(--good);background:var(--good-soft);padding:3px 9px;border-radius:6px}
.why.ai{color:#6B3FA0;background:#F1EAFA}
.rdetail{border-top:1px dashed var(--line);padding:12px 16px 14px;background:#FAFCFE;animation:fadein .18s ease}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.rdetail h5{font-size:11px;font-weight:800;letter-spacing:.08em;color:var(--sub);margin:9px 0 6px}
.rdetail h5:first-child{margin-top:0}
table.spec{width:100%;border-collapse:collapse;font-size:12.5px}
table.spec td{padding:6px 4px;border-bottom:1px solid #EEF2F8;vertical-align:top}
table.spec td:first-child{color:var(--sub);width:35%;font-weight:600}
table.spec tr:last-child td{border-bottom:none}
.flagrow{display:flex;flex-wrap:wrap;gap:5px}
.flg{font-size:11px;font-weight:600;background:var(--blue-soft);color:var(--blue);padding:4px 9px;border-radius:6px}
.flg.no{background:#F0F2F6;color:#9AA8BB;text-decoration:line-through}
.empty{background:var(--surface);border:1px dashed var(--line);border-radius:var(--r);padding:26px 18px;text-align:center;color:var(--sub);font-size:13px;line-height:1.7}
.empty b{color:var(--ink)}
.notice{background:var(--amber-soft);border:1px solid #EBD9A8;border-radius:var(--r);padding:13px 15px;font-size:12.5px;color:#6E4F00;margin-bottom:11px;line-height:1.6}
.aicomment{background:#F1EAFA;border:1px solid #DCCBF2;border-radius:var(--r);padding:13px 15px;font-size:13px;color:#4A2B73;margin-bottom:11px;line-height:1.6}
.aicomment b{display:block;font-size:10.5px;letter-spacing:.1em;margin-bottom:4px;color:#6B3FA0}
.loading{ text-align:center;color:var(--sub);font-size:13px;padding:26px 0}
.spin{display:inline-block;width:17px;height:17px;border:2.5px solid var(--line);border-top-color:var(--blue);border-radius:50%;
  animation:spin .8s linear infinite;vertical-align:-4px;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(16px);background:var(--deep);color:#fff;
  font-size:13px;font-weight:600;padding:11px 18px;border-radius:11px;opacity:0;pointer-events:none;transition:all .25s;z-index:99}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
:focus-visible{outline:2.5px solid var(--cyan);outline-offset:2px;border-radius:6px}
.hidden{display:none!important}
.footer{margin-top:26px;text-align:center;font-size:11px;color:#93A3B8;line-height:1.7}
.footer b{font-family:var(--mono)}
</style>
</head>

<div class="topbar"><div class="topbar-in">
  <div class="brand"><b>모델 파인더</b><span>키워드 제품 추천 · 206종 전 라인업</span></div>
  <div class="mode">
    <button id="mKw" class="on" onclick="setMode('kw')">키워드</button>
    <button id="mAi" onclick="setMode('ai')">AI 추천</button>
  </div>
</div></div>

<div class="wrap">
  <div class="shero">
    <div class="eyebrow">KEYWORD PRODUCT FINDER</div>
    <h1 id="heroTitle">키워드 한 줄이면 됩니다.</h1>
    <p id="heroSub">기능·예산·치수·카테고리를 자유롭게 섞어 입력하세요. 전사 제품 DB 206종에서 찾아드립니다.</p>
  </div>

  <div id="kwBox">
    <div class="searchbox">
      <div class="field"><input id="q" placeholder="예: 무풍 에어컨 300만원 이하" enterkeyhint="search"></div>
      <button class="go" onclick="runSearch()">검색</button>
    </div>
    <div class="exrow" id="exRow"></div>
  </div>

  <div id="aiBox" class="hidden">
    <div class="searchbox">
      <div class="field"><textarea id="aq" placeholder="예: 신혼부부인데 집이 좁아요. 세탁기랑 건조기 둘 다 필요하고 예산은 350만원 정도예요."></textarea></div>
      <button class="go" onclick="runAI()">추천</button>
    </div>
    <div class="aihint">자연어 문장을 AI가 해석해 전 라인업에서 추천합니다. (Claude 환경에서 동작 — 오프라인 시 키워드 모드 사용)</div>
  </div>

  <div class="parsebar" id="parseBar"></div>
  <div id="noticeHost"></div>
  <div id="aiHost"></div>
  <div class="sortrow hidden" id="sortRow"></div>
  <div class="rlist" id="rHost"></div>
  <div class="footer">데이터: samsungCE v2.1 + samsungMX (2026-05-30 검증 · 출시가 기준)<br><b>MODEL FINDER</b> · AX 교육 시리즈 — 키워드 추천 엔진</div>
</div>

const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(t){ const el=$("toast"); el.textContent=t; el.classList.add("show"); clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove("show"),2400); }
function getDims(p){
  if(!p.dims) return null;
  const hw = p.dimkey && p.dimkey.indexOf("H×W") >= 0;
  return hw ? {w:p.dims[1], h:p.dims[0], d:p.dims[2]} : {w:p.dims[0], h:p.dims[1], d:p.dims[2]};
}

/* ===== 질의 해석 ===== */
function parseQuery(raw){
  let q = " " + raw.toLowerCase().replace(/,/g," ") + " ";
  const P = {tokens:[], terms:[], budgetMax:null, budgetMin:null, dim:{}, cats:[], wantNew:false, wantValue:false, wantPremium:false, pkg:false, unsupported:[], tags:[]};
  // 예산: 범위 → 이하 → 이상
  let m = q.match(/(\d{2,5})\s*(?:만\s*원?)?\s*[~∼\-]\s*(\d{2,5})\s*만\s*원?/);
  if(m){ P.budgetMin=+m[1]; P.budgetMax=+m[2]; q=q.replace(m[0]," "); P.tags.push(`예산 ${m[1]}~${m[2]}만원`); }
  m = q.match(/(\d{2,5})\s*만\s*원?\s*(이하|이내|미만|까지|아래)/);
  if(m){ P.budgetMax=+m[1]; q=q.replace(m[0]," "); P.tags.push(`예산 ${m[1]}만원 ${m[2]}`); }
  m = q.match(/(\d{2,5})\s*만\s*원?\s*(이상|넘|초과)/);
  if(m){ P.budgetMin=+m[1]; q=q.replace(m[0]," "); P.tags.push(`예산 ${m[1]}만원 이상`); }
  // 치수: 폭/가로, 높이, 깊이 (이하 제약)
  const dimDefs = [["폭","w"],["가로","w"],["높이","h"],["세로","h"],["깊이","d"]];
  for(const [word,axis] of dimDefs){
    const r = new RegExp(word+"\\s*(\\d{2,4})\\s*(?:mm)?\\s*(이하|이내|미만|까지)?");
    m = q.match(r);
    if(m){ P.dim[axis]=+m[1]; q=q.replace(m[0]," "); P.tags.push(`${word} ${m[1]}mm 이하`); }
  }
  // 토큰화 + 사전 매핑
  const rawToks = q.split(/\s+/).filter(t=>t.length>=2 || /^[a-z0-9]+$/.test(t) && t.length>=1);
  const seen = new Set();
  for(let t of rawToks){
    t = t.replace(/(으로|로|은|는|이|가|을|를|에서|에|도|만|랑|이랑|와|과|좀|요)$/,"") || t;
    if(t.length<2 && !/^[a-z0-9]{2,}$/.test(t)) continue;
    if(seen.has(t)) continue; seen.add(t);
    if(UNSUPPORTED[t]){ P.unsupported.push(UNSUPPORTED[t]); continue; }
    if(CATSYN[t]){ CATSYN[t].forEach(c=>{ if(!P.cats.includes(c)) P.cats.push(c); }); P.tags.push("카테고리: "+t); }
    const exp = SYN[t] || [t];
    for(const e of exp){
      if(e==="__NEW__"){ P.wantNew=true; continue; }
      if(e==="__VALUE__"){ P.wantValue=true; continue; }
      if(e==="__PREMIUM__"){ P.wantPremium=true; continue; }
      if(e==="__PKG__"){ P.pkg=true; continue; }
      if(!P.terms.includes(e)) P.terms.push(e);
    }
    P.tokens.push(t);
  }
  return P;
}

/* ===== 스코어링 ===== */
function search(P){
  const out = [];
  for(const p of PRODUCTS){
    // 하드 필터
    if(P.budgetMax!==null && p.price > P.budgetMax) continue;
    if(P.budgetMin!==null && p.price < P.budgetMin) continue;
    if(Object.keys(P.dim).length){
      const d = getDims(p); if(!d) continue;
      if(P.dim.w && d.w > P.dim.w) continue;
      if(P.dim.h && d.h > P.dim.h) continue;
      if(P.dim.d && d.d > P.dim.d) continue;
    }
    if(P.cats.length && !P.cats.includes(p.cat)) continue;
    // 텍스트 매칭
    let sc = 0; const hits = [];
    for(const t of P.terms){
      const tl = t.toLowerCase();
      if(p.kw.indexOf(tl) >= 0){ sc += 3; hits.push(t); }
      if(p.model.toLowerCase().indexOf(tl) === 0 && tl.length>=3) sc += 8;
    }
    if(P.cats.length) sc += 4;
    if(P.wantNew && p.isnew){ sc += 3; hits.push("2026 신형"); }
    if(P.wantPremium) sc += Math.min(4, p.price/120);
    // 의미 토큰이 있는데 매칭 0이면 제외 (카테고리만 지정한 브라우즈는 허용)
    const hasTerms = P.terms.length > 0;
    if(hasTerms && hits.length===0 && !P.cats.length) continue;
    if(hasTerms && hits.length===0 && P.cats.length) sc = 1;
    out.push({p, sc, hits});
  }
  out.sort((a,b)=>{
    if(b.sc !== a.sc) return b.sc - a.sc;
    if(P.wantValue) return a.p.price - b.p.price;
    if(a.p.isnew !== b.p.isnew) return b.p.isnew - a.p.isnew;
    return b.p.price - a.p.price;
  });
  return out;
}

/* ===== 렌더링 ===== */
let lastResults = [], openId = null, sortMode = "rank";
const EXAMPLES = ["무풍 에어컨 300만 이하","폭 700 냉장고","S펜 노트북","혈압 측정 워치","게이밍 모니터 OLED","펫 세탁기 콤보","로봇청소기 직배수","2026 신형 TV","통역 이어폰","가성비 태블릿"];
function renderExamples(){
  $("exRow").innerHTML = EXAMPLES.map(e=>`<button class="ex" onclick="exGo('${e}')">${e}</button>`).join("");
}
function exGo(e){ $("q").value = e; runSearch(); }

function runSearch(){
  const raw = ($("q").value||"").trim();
  $("aiHost").innerHTML = "";
  if(!raw){ toast("키워드를 입력하세요"); return; }
  const P = parseQuery(raw);
  // 해석 태그 바
  $("parseBar").innerHTML = [
    ...P.tags.map(t=>`<span class="ptag ${t.startsWith('카테고리')?'cat':'fil'}">${esc(t)}</span>`),
    ...P.terms.slice(0,6).map(t=>`<span class="ptag">${esc(t)}</span>`)
  ].join("") + `<span class="rescount" id="resCount"></span>`;
  // 미수록 안내
  $("noticeHost").innerHTML = P.unsupported.length ?
    `<div class="notice"><b>${P.unsupported.map(esc).join(", ")}</b>은(는) 현재 DB 미수록 카테고리입니다. [DB 최신화] 작업으로 보강 예정이며, 우선 수록된 22개 카테고리에서 검색해 보세요.</div>` : "";
  lastResults = search(P);
  sortMode = P.wantValue ? "asc" : "rank";
  renderSortRow();
  renderResults();
}
function renderSortRow(){
  const row = $("sortRow");
  if(!lastResults.length){ row.classList.add("hidden"); return; }
  row.classList.remove("hidden");
  const B = [["rank","추천순"],["asc","낮은 가격"],["desc","높은 가격"],["new","2026 신형"]];
  row.innerHTML = B.map(([k,l])=>`<button class="sbtn ${sortMode===k?'on':''}" onclick="setSort('${k}')">${l}</button>`).join("");
}
function setSort(k){ sortMode=k; renderSortRow(); renderResults(); }
function sorted(){
  const r = lastResults.slice();
  if(sortMode==="asc") r.sort((a,b)=>a.p.price-b.p.price);
  if(sortMode==="desc") r.sort((a,b)=>b.p.price-a.p.price);
  if(sortMode==="new") r.sort((a,b)=>(b.p.isnew-a.p.isnew)||(b.sc-a.sc));
  return r;
}
function renderResults(){
  const list = sorted().slice(0,15);
  const rc = $("resCount"); if(rc) rc.textContent = `${lastResults.length}종 매칭 · 상위 ${list.length}종`;
  if(!lastResults.length){
    $("rHost").innerHTML = `<div class="empty"><b>매칭 결과가 없습니다.</b><br>키워드를 줄이거나 예산·치수 조건을 완화해 보세요.<br>예: "무풍 에어컨" / "폭 920 냉장고" / "노트북 200만 이하"</div>`;
    return;
  }
  $("rHost").innerHTML = list.map((r,i)=>rcard(r,i)).join("");
}
function rcard(r, i){
  const p = r.p, d = getDims(p);
  const open = openId === p.id;
  const why = r.hits.slice(0,4).map(h=>`<span class="why">${esc(h)}</span>`).join("");
  const aiWhy = r.aiWhy ? `<span class="why ai">AI: ${esc(r.aiWhy)}</span>` : "";
  return `<div class="rcard">
    <button class="rmain" onclick="toggleDetail(${p.id})" aria-expanded="${open}">
      <div class="rtop"><span class="rcat">${esc(p.cat)}</span>${p.isnew?'<span class="rnew">2026</span>':''}<span class="rrank">#${String(i+1).padStart(2,"0")}</span></div>
      <div class="rname">${esc(p.group||p.cat)}</div>
      <div class="rcode">${esc(p.model)}</div>
      <div class="rmeta"><span>출시가 <b>${p.price}만</b>${p.price_lab?` <span style="font-size:10.5px">(${esc(p.price_lab)})</span>`:""}</span>
        ${p.dimtxt?`<span>${esc(p.dimtxt)}mm${p.dv===false?" ⚠️추정":""}</span>`:""}</div>
      ${(why||aiWhy)?`<div class="rwhy">${aiWhy}${why}</div>`:""}
    </button>
    ${open?rdetail(p):""}
  </div>`;
}
function rdetail(p){
  const fx = p.fx.filter(([k])=>k!=="등급");
  return `<div class="rdetail">
    <h5>스펙 (DB 검증값)</h5>
    <table class="spec">${fx.map(([k,v])=>`<tr><td>${esc(k)}</td><td>${esc(v)}</td></tr>`).join("")}
      ${p.note?`<tr><td>비고</td><td>${esc(p.note)}</td></tr>`:""}</table>
    ${p.on.length?`<h5>탑재 기능</h5><div class="flagrow">${p.on.map(f=>`<span class="flg">${esc(f)}</span>`).join("")}</div>`:""}
    ${p.off.length?`<h5>미탑재 — 과장 안내 주의</h5><div class="flagrow">${p.off.map(f=>`<span class="flg no">${esc(f)}</span>`).join("")}</div>`:""}
  </div>`;
}
function toggleDetail(id){ openId = (openId===id? null : id); renderResults(); }

/* ===== AI 자연어 추천 (Claude API) ===== */
function setMode(m){
  $("mKw").classList.toggle("on", m==="kw"); $("mAi").classList.toggle("on", m==="ai");
  $("kwBox").classList.toggle("hidden", m!=="kw"); $("aiBox").classList.toggle("hidden", m!=="ai");
  $("heroTitle").textContent = m==="kw" ? "키워드 한 줄이면 됩니다." : "상황을 문장으로 말해주세요.";
  $("heroSub").textContent = m==="kw" ? "기능·예산·치수·카테고리를 자유롭게 섞어 입력하세요. 전사 제품 DB 206종에서 찾아드립니다."
    : "고객 상황을 그대로 입력하면 AI가 전 라인업에서 조합 추천합니다.";
  $("parseBar").innerHTML=""; $("noticeHost").innerHTML=""; $("aiHost").innerHTML=""; $("rHost").innerHTML=""; $("sortRow").classList.add("hidden");
  lastResults=[];
}
function catalogText(){
  return PRODUCTS.map(p=>`${p.id}|${p.cat}|${p.group} ${p.model}|${p.price}만${p.price_lab?"("+p.price_lab+")":""}|${p.on.slice(0,4).join(",")}`).join("\n");
}
async function runAI(){
  const q = ($("aq").value||"").trim();
  if(!q){ toast("상황을 입력하세요"); return; }
  $("rHost").innerHTML = `<div class="loading"><span class="spin"></span>전 라인업 206종을 검토하는 중…</div>`;
  $("aiHost").innerHTML=""; $("parseBar").innerHTML=""; $("noticeHost").innerHTML=""; $("sortRow").classList.add("hidden");
  const prompt = `당신은 삼성 제품 추천 엔진입니다. 아래 카탈로그(id|카테고리|이름|출시가|주요기능)에 있는 제품만 추천할 수 있습니다.

[카탈로그]
${catalogText()}

[고객 상황]
${q}

규칙:
1. 카탈로그에 실재하는 id만 사용. 카탈로그 밖 제품·기능을 지어내지 말 것.
2. 최대 5개 추천. 예산 언급 시 합계/단가를 준수.
3. 필요하면 카테고리 조합(패키지) 추천 가능.
4. 적합한 제품이 없으면 picks를 빈 배열로 하고 comment에 이유를 쓸 것.
응답은 아래 JSON만 출력 (다른 텍스트·마크다운 금지):
{"picks":[{"id":숫자,"why":"추천 이유 한 줄(한국어)"}],"comment":"전체 코멘트 한두 문장(한국어)"}`;
  try{
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({model:"claude-sonnet-4-20250514", max_tokens:1000, messages:[{role:"user",content:prompt}]})
    });
    const data = await res.json();
    const text = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
    const clean = text.replace(/```json|```/g,"").trim();
    const js = JSON.parse(clean.slice(clean.indexOf("{"), clean.lastIndexOf("}")+1));
    const picks = (js.picks||[]).map(pk=>{
      const p = PRODUCTS.find(x=>x.id===pk.id);
      return p ? {p, sc:0, hits:[], aiWhy:pk.why||""} : null;
    }).filter(Boolean);
    lastResults = picks; sortMode="rank";
    $("aiHost").innerHTML = `<div class="aicomment"><b>AI 추천 코멘트</b>${esc(js.comment||"")}</div>`;
    if(!picks.length){
      $("rHost").innerHTML = `<div class="empty"><b>조건에 맞는 제품을 찾지 못했습니다.</b><br>${esc(js.comment||"조건을 완화해 다시 시도해 보세요.")}</div>`;
    } else { renderSortRow(); renderResults(); }
  }catch(err){
    $("rHost").innerHTML = `<div class="empty"><b>AI 연결 실패</b><br>이 기능은 Claude 환경(아티팩트 미리보기)에서 동작합니다.<br>오프라인에서는 상단 [키워드] 모드를 사용하세요 — 동일 DB로 검색됩니다.</div>`;
  }
}

/* ===== 초기화 ===== */
renderExamples();
$("q").addEventListener("keydown", e=>{ if(e.key==="Enter") runSearch(); });
