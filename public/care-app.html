.bar-fill{height:100%;border-radius:8px;transition:width .5s ease}

.sell-num{width:20px;height:20px;border-radius:50%;background:#1428A0;color:#fff;font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}

<script>
/* ── 상태 ── */
let curCat = 'aircon', curPlan = '12', curTypeA = true, curRound = 0, isOpen = false;

/* ────────────────── 헬퍼 ────────────────── */
function gradStyle(g){ return 'background:' + g; }

function stBadge(st){
  if(st==='done') return '<span class="st st-done">완료</span>';
  if(st==='na')   return '<span class="st st-na">자가관리</span>';
  return '<span class="st st-todo">분석예정</span>';
}

function itemsHtml(list){
  return list.map(it =>
    `<div class="item">
      <span class="iico">${it.ico}</span>
      <div>
        <div class="inm">${it.nm}</div>
        <div class="idet">${it.det}</div>
        <span class="itag">${it.tt}</span>
      </div>
    </div>`
  ).join('');
}

function noteHtml(n){
  if(!n) return '';
  return `<div class="note" style="border-color:${n.c}">ℹ️ ${n.t.replace(/\n/g,'<br>')}</div>`;
}

/* ────────────────── 드롭다운 ────────────────── */
function buildDropHtml(){
  return PRODUCTS.map(p =>
    `<div class="drop-row${p.key===curCat?' sel':''}" data-key="${p.key}">
      <div class="drop-row-l">
        <span class="drop-ico">${p.icon}</span>
        <span class="drop-nm">${p.name}</span>
      </div>
      ${stBadge(p.st)}
    </div>`
  ).join('');
}

function openDrop(){
  isOpen = true;
  document.getElementById('catBtn').classList.add('open');
  document.getElementById('catArr').classList.add('open');
  document.getElementById('catDrop').style.display = 'block';
}
function closeDrop(){
  isOpen = false;
  document.getElementById('catBtn').classList.remove('open');
  document.getElementById('catArr').classList.remove('open');
  document.getElementById('catDrop').style.display = 'none';
}

/* ────────────────── 요약 타일 ────────────────── */
function buildSummary(d){
  if(d.onlyPlan === '12') return [
    {l:'계약기간', v:d.contract},
    {l:'총 방문',  v:d.total12},
    {l:'방문 주기',v:'매 12개월'}
  ];
  if(d.onlyPlan === '36') return [
    {l:'계약기간', v:d.contract},
    {l:'총 방문',  v:d.total36},
    {l:'방문 주기',v:'매 36개월'}
  ];
  return [
    {l:'계약기간', v:d.contract},
    {l:'12개월형', v:d.total12},
    {l:'36개월형', v:d.total36}
  ];
}

/* ────────────────── 12개월형 ────────────────── */
function render12(d){
  /* rounds[] 배열 구조 (dish·airpur_s·purifier_under 등) → render36과 동일 방식 */
  if(d.plan12.rounds){
    const rr = d.plan12.rounds;
    let out = '';
    out += '<div class="vtabs">';
    rr.forEach((r,i) => {
      out += `<div class="vtab${curRound===i?' on':''}" data-round="${i}">
        <div class="vtn">${r.label}</div>
        <div class="vtm">${r.month}</div>
      </div>`;
    });
    out += '</div>';
    const cr = rr[curRound];
    out += `<div class="card">
      <div class="card-hd" style="${gradStyle(cr.grad)}">
        <span class="chd-t">🔧 ${cr.label} — ${cr.month}</span>
        <span class="chip">${cr.badge}</span>
      </div>
      <div class="items">${itemsHtml(cr.items)}</div>
      ${noteHtml(cr.note)}
    </div>`;
    return out;
  }

  const isSingle = d.plan12.singleType;
  const tA = d.plan12.typeA;
  const tB = isSingle ? null : d.plan12.typeB;
  const ct = isSingle ? tA : (curTypeA ? tA : tB);
  let out = '';

  if(!isSingle){
    // A/B 타입 탭
    out += '<div class="type-tabs">';
    [{t:tA,isA:true},{t:tB,isA:false}].forEach(({t,isA})=>{
      const active = isA ? curTypeA : !curTypeA;
      const cls    = active ? (isA?'blue':'teal') : '';
      const tagBg  = isA
        ? 'linear-gradient(90deg,#1d4ed8,#3730a3)'
        : 'linear-gradient(90deg,#0d9488,#1d4ed8)';
      const nmColor = isA ? '#1259c3' : '#0d9488';
      out += `<div class="type-tab ${cls}" data-type="${isA?'A':'B'}">
        <div class="ttag" style="background:${tagBg}">${t.badge}</div>
        <div class="tnm" style="color:${nmColor}">${isA?'A타입':'B타입'}</div>
        <div class="tlbl">${t.sub}</div>
        <div class="tmo">${t.rounds.join(' · ')}</div>
      </div>`;
    });
    out += '</div>';

    // A/B 비교 카드
    out += `<div class="card"><div class="cmp">
      <div class="cmp-t">📊 12개월형 방문 구성</div>
      <div class="cmp-g">
        <div>
          <div class="cmp-hd" style="background:rgba(18,89,195,.1);color:#1259c3">A타입 (4회)</div>
          ${tA.rounds.map(r=>`<div class="cmp-i" style="color:${curTypeA?'#16181b':'#9aa0a6'}">${r}</div>`).join('')}
          <div style="font-size:9px;color:#1259c3;padding:3px 5px">→ 기본점검·케어</div>
        </div>
        <div class="vs">VS</div>
        <div>
          <div class="cmp-hd" style="background:rgba(13,148,136,.1);color:#0d9488">B타입 (2회)</div>
          ${tB.rounds.map(r=>`<div class="cmp-i" style="color:${!curTypeA?'#16181b':'#9aa0a6'}">${r}</div>`).join('')}
          <div style="font-size:9px;color:#0d9488;padding:3px 5px">→ 기본 세척</div>
        </div>
      </div>
    </div></div>`;
  } else {
    // 단일 타입 — 회차 pill 요약
    out += `<div class="card"><div style="padding:13px">
      <div class="cmp-t" style="text-align:left;margin-bottom:8px">📊 12개월형 방문 구성 (${tA.rounds.length}회)</div>
      <div class="round-pills">
        ${tA.rounds.map(r=>`<span class="round-pill${r.includes('★')?' star':''}">${r}</span>`).join('')}
      </div>
      <div style="font-size:9px;color:#1259c3;margin-top:4px">→ ${tA.sub} (전 회차 동일)</div>
    </div></div>`;
  }

  // 서비스 상세 카드
  out += `<div class="card">
    <div class="card-hd" style="${gradStyle(ct.grad)}">
      <span class="chd-t">🔧 ${ct.label} — ${ct.sub}</span>
      <span class="chip">${ct.badge}</span>
    </div>
    <div class="items">${itemsHtml(ct.items)}</div>
    ${noteHtml(ct.note)}
  </div>`;
  return out;
}

/* ────────────────── 36개월형 ────────────────── */
function render36(d){
  const rr = d.plan36.rounds;
  let out = '';

  // 회차 탭
  out += '<div class="vtabs">';
  rr.forEach((r,i) => {
    out += `<div class="vtab${curRound===i?' on':''}" data-round="${i}">
      <div class="vtn">${r.label}</div>
      <div class="vtm">${r.month}</div>
    </div>`;
  });
  out += '</div>';

  const cr = rr[curRound];
  out += `<div class="card">
    <div class="card-hd" style="${gradStyle(cr.grad)}">
      <span class="chd-t">🔧 ${cr.label} — ${cr.month}</span>
      <span class="chip">${cr.badge}</span>
    </div>
    <div class="items">${itemsHtml(cr.items)}</div>
    ${noteHtml(cr.note)}
  </div>`;

  if(rr.length >= 2){
    out += `<div class="card"><div class="cmp">
      <div class="cmp-t">📊 36개월형 — 1회차 vs 2회차</div>
      <div class="cmp-g">
        <div>
          <div class="cmp-hd" style="background:rgba(18,89,195,.1);color:#1259c3">1회차 (${rr[0].month})</div>
          ${rr[0].items.map(it=>`<div class="cmp-i">${it.nm}</div>`).join('')}
        </div>
        <div class="vs">VS</div>
        <div>
          <div class="cmp-hd" style="background:rgba(13,148,136,.1);color:#0d9488">2회차 (${rr[1].month})</div>
          ${rr[1].items.map(it=>`<div class="cmp-i">${it.nm}</div>`).join('')}
        </div>
      </div>
    </div></div>`;
  }
  return out;
}

/* ────────────────── 포함/제외·범례·출처 ────────────────── */
function buildTail(d){
  return `
  <div class="card">
    <div class="be">
      <div>
        <div class="be-hd" style="color:#16a34a">✅ 포함</div>
        ${d.includes.map(x=>`<div class="be-i">${x}</div>`).join('')}
      </div>
      <div>
        <div class="be-hd" style="color:#dc2626">❌ 제외·주의</div>
        ${d.excludes.map(x=>`<div class="be-i">${x}</div>`).join('')}
      </div>
    </div>
  </div>
  <div class="card">
    <div class="lgd">
      <div class="lgd-t">아이콘 범례</div>
      <div class="lgd-i">✅ <span class="itag">삼성닷컴 공식</span> 공식 페이지 직접 확인</div>
      <div class="lgd-i" style="margin-top:4px">🔵 <span class="itag" style="background:rgba(13,148,136,.1);color:#0d9488">현장 확인 필요</span> 내부 자료 확인 후 업데이트 필요</div>
    </div>
  </div>
  <div class="src-wrap">
    <div class="src-row"><span class="src-dot"></span>${d.src}</div>
    <div class="src-row"><span class="src-dot src-dot2"></span>🔵 항목: 고객센터 1588-6084 확인 권장</div>
  </div>`;
}

/* ────────────────── 메인 렌더 ────────────────── */
function render(){
  const d = DATA[curCat];
  const p = PRODUCTS.find(x => x.key === curCat);

  // 드롭다운 콘텐츠 갱신
  document.getElementById('catDrop').innerHTML = buildDropHtml();
  document.querySelectorAll('.drop-row').forEach(el => {
    el.addEventListener('click', () => {
      curCat  = el.dataset.key;
      curRound = 0; curTypeA = true;
      const dd = DATA[curCat];
      curPlan = dd?.onlyPlan || '12';
      closeDrop();
      render();
    });

  // 헤더 갱신

    </div>`;

    ];

    tabs.forEach(t => {
      const active = curPlan === t.id;
      const cls = active ? (t.id==='12' ? 'blue' : 'teal') : '';

        <div class="pnm">${t.name}</div>

      </div>`;
    });
    out += '</div>';
  }

  /* 본문 */
  out += curPlan === '12' ? render12(d) : render36(d);
  out += buildTail(d);

  out += renderSelling(curCat);
  body.innerHTML = out;

  /* 이벤트 바인딩 */
  document.querySelectorAll('.plan-tab').forEach(el => {
    el.addEventListener('click', () => {

  document.querySelectorAll('.vtab').forEach(el => {
    el.addEventListener('click', () => {
      curRound = +el.dataset.round; render();
    });
  });
}

/* ═══════════════ MODE ═══════════════ */
let curMode = 'care';

function setMode(m){
  curMode = m;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('on', t.dataset.mode === m));
  document.querySelector('.cat-wrap').style.display = m==='care' ? '' : 'none';
  document.getElementById('body').style.display = m==='care' ? '' : 'none';
  document.getElementById('overviewPane').style.display = m==='overview' ? '' : 'none';
  document.getElementById('timelinePane').style.display = m==='timeline' ? '' : 'none';
  if(m==='overview') renderOverview();
  if(m==='timeline') renderTimeline();
}

/* ═══════════════ OVERVIEW ═══════════════ */
function renderOverview(){
  const el = document.getElementById('overviewPane');
  let html = '<div class="ov-grid">';
  PRODUCTS.forEach(p => {
    const d = DATA[p.key];
    const isDone = p.st==='done';
    let pills = '';
    if(isDone && d){
      if(d.onlyPlan==='12') pills += '<span class="ov-pill p12">12개월형</span>';
      else if(d.onlyPlan==='36') pills += '<span class="ov-pill p36">36개월형</span>';
      else {
        if(d.plan12) pills += '<span class="ov-pill p12">12개월형</span>';
        if(d.plan36) pills += '<span class="ov-pill p36">36개월형</span>';
      }
    } else {
      pills = '<span class="ov-pill pna">자가관리</span>';
    }
    html += '<div class="ov-card ' + (isDone?'done':'na-card') + '" ' + (isDone?'onclick="switchToCare(\''+p.key+'\')"':'') + '>' +
      '<div class="ov-ico">' + p.icon + '</div>' +
      '<div class="ov-nm">' + p.name + '</div>' +
      '<div class="ov-pills">' + pills + '</div>' +
      '</div>';
  });
  html += '</div>';
  el.innerHTML = html;
}

function switchToCare(key){
  const idx = PRODUCTS.findIndex(p=>p.key===key);
  if(idx>=0){
    curCat = key;
    curPlan = DATA[key]?.onlyPlan || '12';
    curRound = 0;
    curTypeA = true;
  }
  setMode('care');
  render();
}

/* ═══════════════ TIMELINE ═══════════════ */
const TL_MONTHS = {
  aircon:   {12:[12,24,48,60], '12b':[36,72], 36:[36,72]},
  aicombo:  {12:[12,24,36,48,60,72], 36:[36,72]},
  washer:   {12:[12,24,36,48,60,72], 36:[36,72]},
  dryer:    {12:[12,24,36,48,60,72], 36:[36,72]},
  fridge:   {12:[36,72], 36:[36,72]},
  kimchi:   {12:[36,72], 36:[36,72]},
  dish:     {12:[12,24,36,48,60,72], 36:[12,24,36,48,60,72]},
  dresser:  {12:[12,24,36,48,60,72]},
  airpur_reusable:{12:[12,24,36,48,60,72]},
  airpur_s:       {12:[12,24,36,48,60,72]},
  purifier_under: {12:[12,24,36,48,60,72]},
  vacuum:         {12:[12,24,36,48,60,72]},
};

let tlKey='aircon', tlPlan='12', tlYear=2026, tlMonth=7;

function renderTimeline(){
  const done = PRODUCTS.filter(p=>p.st==='done');
  const d = DATA[tlKey]||{};
  const plans = [];
  if(!d.onlyPlan||d.onlyPlan==='12') plans.push('12');
  if(d.plan36 && (!d.onlyPlan||d.onlyPlan==='36')) plans.push('36');

  let prodOpts = done.map(p=>'<option value="'+p.key+'" '+(p.key===tlKey?'selected':'')+'>'+p.icon+' '+p.name+'</option>').join('');
  let planOpts = plans.map(pl=>'<option value="'+pl+'" '+(pl===tlPlan?'selected':'')+'>매 '+pl+'개월형</option>').join('');
  let yearOpts = [2024,2025,2026,2027,2028,2029,2030].map(y=>'<option value="'+y+'" '+(y===tlYear?'selected':'')+'>'+y+'년</option>').join('');
  let monthOpts = Array.from({length:12},(_,i)=>'<option value="'+(i+1)+'" '+((i+1)===tlMonth?'selected':'')+'>'+(i+1)+'월</option>').join('');

  const months = ((TL_MONTHS[tlKey]||{})[tlPlan]) || [];
  const now = new Date();
  const startDate = new Date(tlYear, tlMonth-1, 1);
  const nowOffsetMonths = Math.max(0, (now.getFullYear()-startDate.getFullYear())*12 + (now.getMonth()-startDate.getMonth()));

  const SVG_W = 680, SVG_H = 80, PAD = 30, INNER = SVG_W - PAD*2;
  const MON_W = INNER / 72;
  let svgDots = '';
  for(let i=0;i<=72;i+=6){
    const x = PAD + i*MON_W;
    svgDots += '<text x="'+x+'" y="'+(SVG_H-5)+'" font-size="9" fill="#aab0b8" text-anchor="middle">'+i+'M</text>';
    svgDots += '<line x1="'+x+'" y1="12" x2="'+x+'" y2="'+(SVG_H-18)+'" stroke="#ecedf1" stroke-width="1"/>';
  }
  if(nowOffsetMonths<=72){
    const nx = PAD + nowOffsetMonths*MON_W;
    svgDots += '<line x1="'+nx+'" y1="8" x2="'+nx+'" y2="'+(SVG_H-20)+'" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,2"/>';
    svgDots += '<text x="'+nx+'" y="7" font-size="8" fill="#ef4444" text-anchor="middle">현재</text>';
  }
  svgDots += '<line x1="'+PAD+'" y1="40" x2="'+(SVG_W-PAD)+'" y2="40" stroke="#dde1e9" stroke-width="2"/>';
  months.forEach((m,i)=>{
    const x = PAD + m*MON_W;
    const col = tlPlan==='12' ? '#1d4ed8' : '#0d9488';
    svgDots += '<circle cx="'+x+'" cy="40" r="12" fill="'+col+'"/>';
    svgDots += '<text x="'+x+'" y="44" font-size="9" fill="#fff" text-anchor="middle" font-weight="800">'+(i+1)+'회</text>';
  });
  const svg = '<svg viewBox="0 0 '+SVG_W+' '+SVG_H+'" width="100%" style="min-width:600px">'+svgDots+'</svg>';

  let listHtml = '';
  months.forEach((m,i)=>{
    const dt = new Date(tlYear, tlMonth-1+m, 1);
    const isPast = dt < now;
    const col = tlPlan==='12'?'p12c':'p36c';
    listHtml += '<div class="tl-item" style="'+(isPast?'opacity:.5':'')+'">' +
      '<div class="tl-dot '+col+'">'+(i+1)+'</div>' +
      '<div>' +
        '<div class="tl-round">'+(i+1)+'회차 방문케어 '+(isPast?'✓ 완료':'')+'</div>' +
        '<div class="tl-date">'+dt.getFullYear()+'년 '+(dt.getMonth()+1)+'월 (구독 '+m+'개월차)</div>' +
      '</div></div>';
  });
  if(!listHtml) listHtml = '<div style="text-align:center;color:#9aa0a6;font-size:12px;padding:20px">선택한 플랜에 타임라인 정보가 없습니다</div>';

  document.getElementById('timelinePane').innerHTML =
    '<div class="tl-ctrl">' +
      '<div class="tl-row"><select class="tl-sel" onchange="tlKey=this.value;renderTimeline()">'+prodOpts+'</select>' +
      '<select class="tl-sel" style="flex:.6" onchange="tlPlan=this.value;renderTimeline()">'+planOpts+'</select></div>' +
      '<div class="tl-row"><div style="font-size:11px;color:#8a9099;padding-bottom:6px;font-weight:600">📆 구독 시작월</div></div>' +
      '<div class="tl-row"><select class="tl-sel" onchange="tlYear=+this.value;renderTimeline()">'+yearOpts+'</select>' +
      '<select class="tl-sel" style="flex:.5" onchange="tlMonth=+this.value;renderTimeline()">'+monthOpts+'</select></div>' +
    '</div>' +
    '<div class="tl-bar" style="overflow-x:auto">'+svg+'</div>' +
    '<div style="padding:0 16px 6px;font-size:10px;color:#9aa0a6">● 빨간 점선 = 오늘('+now.getFullYear()+'.'+String(now.getMonth()+1).padStart(2,'0')+'.'+String(now.getDate()).padStart(2,'0')+') 기준</div>' +
    '<div class="tl-list">'+listHtml+'</div>';
}


/* ═══════════════ SELLING POINTS RENDER ═══════════════ */
function renderSelling(key){
  if(!SELLING || !SELLING[key]) return '';
  const s = SELLING[key];
  if(!s||!s.points) return '';
  const pts = s.points.map((p,i)=>'<div class="sell-pt"><div class="sell-num">'+(i+1)+'</div><div class="sell-text">'+p+'</div></div>').join('');
  const qas = (s.objections||[]).map(o=>'<div class="sell-qa"><div class="sell-q">'+o.q+'</div><div class="sell-a">'+o.a+'</div></div>').join('');
  const objSec = qas ? '<div class="sell-obj"><div class="sell-obj-t">💬 자주 묻는 반론 대응</div>'+qas+'</div>' : '';
  return '<div class="sell-card" id="sellCard">' +
    '<div class="sell-hd" onclick="toggleSell()">' +
      '<div class="sell-t">🎯 영업 핵심 멘트</div>' +
      '<span class="sell-arr" id="sellArr">▼</span>' +
    '</div>' +
    '<div class="sell-body" id="sellBody">'+pts+objSec+'</div>' +
    '</div>';
}

let _sellOpen = false;
function toggleSell(){
  _sellOpen = !_sellOpen;
  const b = document.getElementById('sellBody');
  const a = document.getElementById('sellArr');
  if(b) b.style.display = _sellOpen?'block':'none';
  if(a) a.classList.toggle('open',_sellOpen);
}
</script>
