            {ico:"🔧",nm:"서비스센터 정기 점검 의뢰",det:"3~4년 주기 삼성전자서비스센터 방문 점검 권장. 마그네트론·트랜스포머 상태 확인",tag:"na",tt:"서비스센터"},
          ],
          note:{c:"#0d9488",t:"오류코드 표시, 가열 불량, 불꽃(스파크) 발생 시
즉시 전원 차단 후 삼성전자서비스센터(1588-3366)에 문의하세요."}
        }
      ]
    },
    includes:["제품 보증기간 내 무상 수리","삼성전자서비스센터 유상 수리 (AI구독 미해당)"],
    excludes:["삼성 AI구독 케어 대상 제품 아님 (방문 케어 미제공)","소모성 부품 실비","고객 과실 손상","도어 패킹·회전판 등 소모성 부품 유상"]
  }
  ,soundbar:{
    name:"사운드바", icon:"🔊",
    contract:"자가관리", total36:"AI구독 미해당",
    onlyPlan:"36",
    src:"ℹ️ 삼성 사운드바는 AI구독 케어 미대상 제품 — 자가관리 가이드 제공",
    plan36:{
      rounds:[
        {
          label:"일상 관리", month:"수시",
          grad:"linear-gradient(90deg,#6366f1,#0d9488)", badge:"자가관리", bc:"bbl",
          items:[
            {ico:"🧹",nm:"그릴 먼지 제거",det:"사운드바 전면 그릴 천과 후면 포트에 먼지 축적 시 소음·음질 저하 원인 — 마른 부드러운 솔로 주기적 청소",tag:"na",tt:"자가관리"},
            {ico:"✅",nm:"Q심포니 연동 상태 확인",det:"삼성 TV와 Q심포니 연동 — SmartThings 앱에서 'TV 스피커+사운드바 동시 사용' 설정 정상 여부 확인",tag:"na",tt:"자가점검"},
            {ico:"✅",nm:"eARC 연결 상태 점검",det:"HDMI eARC 포트 연결 불량 시 음질 저하 — HDMI 케이블 교체 또는 포트 접점 청소",tag:"na",tt:"자가점검"},
            {ico:"✅",nm:"무선 리어 스피커 연결 확인 (Q990H/Q900H)",det:"무선 리어 스피커 연결 끊김 시 사운드바 전원 OFF/ON 재시도. 5GHz Wi-Fi 간섭 환경에서는 배치 변경",tag:"na",tt:"자가점검"},
          ],
          note:{c:"#6366f1",t:"사운드바는 삼성 AI구독 케어 미대상 제품입니다.
SmartThings 앱 원격 진단(AI 사운드 최적화·SpaceFit Sound)을 활용해 음장 상태를 확인하세요."}
        },
        {
          label:"정기 점검", month:"연 1회 권장",
          grad:"linear-gradient(90deg,#0d9488,#1d4ed8)", badge:"주기 점검", bc:"btl",
          items:[
            {ico:"✅",nm:"펌웨어 업데이트 확인",det:"SmartThings 앱 또는 사운드바 설정 메뉴에서 최신 펌웨어 업데이트 적용. 음질·연결 안정성 개선",tag:"na",tt:"자가점검"},
            {ico:"✅",nm:"SmartThings 자동화 규칙 점검",det:"TV 켜면 사운드바 자동 켜짐 등 SmartThings 자동화 정상 동작 확인",tag:"na",tt:"자가점검"},
            {ico:"🔧",nm:"음질 이상·연결 불량 지속 시 서비스센터",det:"소리 끊김, 한쪽 채널 무음, 서브우퍼 미작동 등 지속 발생 시 삼성전자서비스센터(1588-3366) 점검",tag:"na",tt:"서비스센터"},
          ],
          note:{c:"#0d9488",t:"사운드바 소리 완전 무음·물리적 손상 시
삼성전자서비스센터(1588-3366)에 문의하세요."}
        }
      ]
    },
    includes:["제품 보증기간 내 무상 수리","SmartThings 앱 AI 사운드 최적화·SpaceFit Sound 자동 보정"],
    excludes:["삼성 AI구독 케어 대상 제품 아님 (방문 케어 미제공)","소모성 부품 실비","고객 과실 손상","HDMI 케이블 등 액세서리 미포함"]
  }
};
</script>
<script>
/* ── 상태 ── */
let curCat = 'aircon', curPlan = '12', curTypeA = true, curRound = 0, isOpen = false;

/* ────────────────── 헬퍼 ────────────────── */
function gradStyle(g){ return 'background:' + g; }

function stBadge(st){
  if(st==='done') return '<span class="st st-done">완료</span>';
  if(st==='na')   return '<span class="st st-na">자가관리</span>';
  return '<span class="st st-todo">분석예정</span>';
}

function itemsHtml(list){
  return list.map(it =>
    `<div class="item">
      <span class="iico">${it.ico}</span>
      <div>
        <div class="inm">${it.nm}</div>
        <div class="idet">${it.det}</div>
        <span class="itag">${it.tt}</span>
      </div>
    </div>`
  ).join('');
}

function noteHtml(n){
  if(!n) return '';
  return `<div class="note" style="border-color:${n.c}">ℹ️ ${n.t.replace(/\n/g,'<br>')}</div>`;
}

/* ────────────────── 드롭다운 ────────────────── */
function buildDropHtml(){
  return PRODUCTS.map(p =>
    `<div class="drop-row${p.key===curCat?' sel':''}" data-key="${p.key}">
      <div class="drop-row-l">
        <span class="drop-ico">${p.icon}</span>
        <span class="drop-nm">${p.name}</span>
      </div>
      ${stBadge(p.st)}
    </div>`
  ).join('');
}

function openDrop(){
  isOpen = true;
  document.getElementById('catBtn').classList.add('open');
  document.getElementById('catArr').classList.add('open');
  document.getElementById('catDrop').style.display = 'block';
}
function closeDrop(){
  isOpen = false;
  document.getElementById('catBtn').classList.remove('open');
  document.getElementById('catArr').classList.remove('open');
  document.getElementById('catDrop').style.display = 'none';
}

/* ────────────────── 요약 타일 ────────────────── */
function buildSummary(d){
  if(d.onlyPlan === '12') return [
    {l:'계약기간', v:d.contract},
    {l:'총 방문',  v:d.total12},
    {l:'방문 주기',v:'매 12개월'}
  ];
  if(d.onlyPlan === '36') return [
    {l:'계약기간', v:d.contract},
    {l:'총 방문',  v:d.total36},
    {l:'방문 주기',v:'매 36개월'}
  ];
  return [
    {l:'계약기간', v:d.contract},
    {l:'12개월형', v:d.total12},
    {l:'36개월형', v:d.total36}
  ];
}

/* ────────────────── 12개월형 ────────────────── */
function render12(d){
  /* rounds[] 배열 구조 (dish·airpur_s·purifier_under 등) → render36과 동일 방식 */
  if(d.plan12.rounds){
    const rr = d.plan12.rounds;
    let out = '';
    out += '<div class="vtabs">';
    rr.forEach((r,i) => {
      out += `<div class="vtab${curRound===i?' on':''}" data-round="${i}">
        <div class="vtn">${r.label}</div>
        <div class="vtm">${r.month}</div>
      </div>`;
    });
    out += '</div>';
    const cr = rr[curRound];
    out += `<div class="card">
      <div class="card-hd" style="${gradStyle(cr.grad)}">
        <span class="chd-t">🔧 ${cr.label} — ${cr.month}</span>
        <span class="chip">${cr.badge}</span>
      </div>
      <div class="items">${itemsHtml(cr.items)}</div>
      ${noteHtml(cr.note)}
    </div>`;
    return out;
  }

  const isSingle = d.plan12.singleType;
  const tA = d.plan12.typeA;
  const tB = isSingle ? null : d.plan12.typeB;
  const ct = isSingle ? tA : (curTypeA ? tA : tB);
  let out = '';

  if(!isSingle){
    // A/B 타입 탭
    out += '<div class="type-tabs">';
    [{t:tA,isA:true},{t:tB,isA:false}].forEach(({t,isA})=>{
      const active = isA ? curTypeA : !curTypeA;
      const cls    = active ? (isA?'blue':'teal') : '';
      const tagBg  = isA
        ? 'linear-gradient(90deg,#1d4ed8,#3730a3)'
        : 'linear-gradient(90deg,#0d9488,#1d4ed8)';
      const nmColor = isA ? '#1259c3' : '#0d9488';
      out += `<div class="type-tab ${cls}" data-type="${isA?'A':'B'}">
        <div class="ttag" style="background:${tagBg}">${t.badge}</div>
        <div class="tnm" style="color:${nmColor}">${isA?'A타입':'B타입'}</div>
        <div class="tlbl">${t.sub}</div>
        <div class="tmo">${t.rounds.join(' · ')}</div>
      </div>`;
    });
    out += '</div>';

    // A/B 비교 카드
    out += `<div class="card"><div class="cmp">
      <div class="cmp-t">📊 12개월형 방문 구성</div>
      <div class="cmp-g">
        <div>
          <div class="cmp-hd" style="background:rgba(18,89,195,.1);color:#1259c3">A타입 (4회)</div>
          ${tA.rounds.map(r=>`<div class="cmp-i" style="color:${curTypeA?'#16181b':'#9aa0a6'}">${r}</div>`).join('')}
          <div style="font-size:9px;color:#1259c3;padding:3px 5px">→ 기본점검·케어</div>
        </div>
        <div class="vs">VS</div>
        <div>
          <div class="cmp-hd" style="background:rgba(13,148,136,.1);color:#0d9488">B타입 (2회)</div>
          ${tB.rounds.map(r=>`<div class="cmp-i" style="color:${!curTypeA?'#16181b':'#9aa0a6'}">${r}</div>`).join('')}
          <div style="font-size:9px;color:#0d9488;padding:3px 5px">→ 기본 세척</div>
        </div>
      </div>
    </div></div>`;
  } else {
    // 단일 타입 — 회차 pill 요약
    out += `<div class="card"><div style="padding:13px">
      <div class="cmp-t" style="text-align:left;margin-bottom:8px">📊 12개월형 방문 구성 (${tA.rounds.length}회)</div>
      <div class="round-pills">
        ${tA.rounds.map(r=>`<span class="round-pill${r.includes('★')?' star':''}">${r}</span>`).join('')}
      </div>
      <div style="font-size:9px;color:#1259c3;margin-top:4px">→ ${tA.sub} (전 회차 동일)</div>
    </div></div>`;
  }

  // 서비스 상세 카드
  out += `<div class="card">
    <div class="card-hd" style="${gradStyle(ct.grad)}">
      <span class="chd-t">🔧 ${ct.label} — ${ct.sub}</span>
      <span class="chip">${ct.badge}</span>
    </div>
    <div class="items">${itemsHtml(ct.items)}</div>
    ${noteHtml(ct.note)}
  </div>`;
  return out;
}

/* ────────────────── 36개월형 ────────────────── */
function render36(d){
  const rr = d.plan36.rounds;
  let out = '';

  // 회차 탭
  out += '<div class="vtabs">';
  rr.forEach((r,i) => {
    out += `<div class="vtab${curRound===i?' on':''}" data-round="${i}">
      <div class="vtn">${r.label}</div>
      <div class="vtm">${r.month}</div>
    </div>`;
  });
  out += '</div>';

  const cr = rr[curRound];
  out += `<div class="card">
    <div class="card-hd" style="${gradStyle(cr.grad)}">
      <span class="chd-t">🔧 ${cr.label} — ${cr.month}</span>
      <span class="chip">${cr.badge}</span>
    </div>
    <div class="items">${itemsHtml(cr.items)}</div>
    ${noteHtml(cr.note)}
  </div>`;

  if(rr.length >= 2){
    out += `<div class="card"><div class="cmp">
      <div class="cmp-t">📊 36개월형 — 1회차 vs 2회차</div>
      <div class="cmp-g">
        <div>
          <div class="cmp-hd" style="background:rgba(18,89,195,.1);color:#1259c3">1회차 (${rr[0].month})</div>
          ${rr[0].items.map(it=>`<div class="cmp-i">${it.nm}</div>`).join('')}
        </div>
        <div class="vs">VS</div>
        <div>
          <div class="cmp-hd" style="background:rgba(13,148,136,.1);color:#0d9488">2회차 (${rr[1].month})</div>
          ${rr[1].items.map(it=>`<div class="cmp-i">${it.nm}</div>`).join('')}
        </div>
      </div>
    </div></div>`;
  }
  return out;
}

/* ────────────────── 포함/제외·범례·출처 ────────────────── */
function buildTail(d){
  return `
  <div class="card">
    <div class="be">
      <div>
        <div class="be-hd" style="color:#16a34a">✅ 포함</div>
        ${d.includes.map(x=>`<div class="be-i">${x}</div>`).join('')}
      </div>
      <div>
        <div class="be-hd" style="color:#dc2626">❌ 제외·주의</div>
        ${d.excludes.map(x=>`<div class="be-i">${x}</div>`).join('')}
      </div>
    </div>
  </div>
  <div class="card">
    <div class="lgd">
      <div class="lgd-t">아이콘 범례</div>
      <div class="lgd-i">✅ <span class="itag">삼성닷컴 공식</span> 공식 페이지 직접 확인</div>
      <div class="lgd-i" style="margin-top:4px">🔵 <span class="itag" style="background:rgba(13,148,136,.1);color:#0d9488">현장 확인 필요</span> 내부 자료 확인 후 업데이트 필요</div>
    </div>
  </div>
  <div class="src-wrap">
    <div class="src-row"><span class="src-dot"></span>${d.src}</div>
    <div class="src-row"><span class="src-dot src-dot2"></span>🔵 항목: 고객센터 1588-6084 확인 권장</div>
  </div>`;
}

/* ────────────────── 메인 렌더 ────────────────── */
function render(){
  const d = DATA[curCat];
  const p = PRODUCTS.find(x => x.key === curCat);

  // 드롭다운 콘텐츠 갱신
  document.getElementById('catDrop').innerHTML = buildDropHtml();
  document.querySelectorAll('.drop-row').forEach(el => {
    el.addEventListener('click', () => {
      curCat  = el.dataset.key;
      curRound = 0; curTypeA = true;
      const dd = DATA[curCat];
      curPlan = dd?.onlyPlan || '12';
      closeDrop();
      render();
    });
  });

  // 헤더 갱신
  document.getElementById('selIco').textContent = p.icon;
  document.getElementById('selNm').textContent  = p.name;
  document.getElementById('selDc').textContent  = p.desc;

  const body = document.getElementById('body');
  let out = '';

  if(!d && p.st==='na'){
    body.innerHTML = '<div class="todo-card"><div class="todo-ico">'+p.icon+'</div><div class="todo-t" style="color:#6366f1">'+p.name+' — 자가관리 가이드</div><div class="todo-s">'+p.desc+'<br><br>이 제품은 <b>삼성 AI구독 케어 미대상</b> 제품입니다. 자가관리 가이드를 참조하거나 삼성전자서비스센터(1588-3366)에 문의하세요.</div></div>';
    return;
  }
    /* TODO 상태 */
  if(!d){
    body.innerHTML = `<div class="todo-card">
      <div class="todo-ico">${p.icon}</div>
      <div class="todo-t">${p.name} — 분석 예정</div>
      <div class="todo-s">삼성닷컴 공식 구독 제품 페이지 URL을 붙여주시면<br>동일한 방식으로 분석·업데이트 가능합니다.</div>
    </div>`;
    return;
  }

  /* 요약 타일 */
  const cells = buildSummary(d);
  out += `<div class="sumrow">
    ${cells.map(c=>`<div class="si"><div class="sl">${c.l}</div><div class="sv">${c.v}</div></div>`).join('')}
  </div>`;

  /* 플랜 탭 (12·36 둘 다 있을 때) */
  if(!d.onlyPlan){
    const tabs = [
      {id:'12', tag:'총 6회 방문', tagBg:'linear-gradient(90deg,#1d4ed8,#7c3aed)', pico:'📅', name:'12개월형', sub1:'매 12개월 방문', sub2:'A타입 4회+B타입 2회'},
      {id:'36', tag:'총 2회 방문', tagBg:'linear-gradient(90deg,#0d9488,#1d4ed8)', pico:'🗓️', name:'36개월형', sub1:'매 36개월 방문', sub2:'1·2회차 케어 상이'}
    ];
    out += '<div class="plan-tabs">';
    tabs.forEach(t => {
      const active = curPlan === t.id;
      const cls = active ? (t.id==='12' ? 'blue' : 'teal') : '';
      out += `<div class="plan-tab ${cls}" data-plan="${t.id}">
        <div class="ptag" style="background:${t.tagBg}">${t.tag}</div>
        <div class="pico">${t.pico}</div>
        <div class="pnm">${t.name}</div>
        <div class="psub">${t.sub1}<br>${t.sub2}</div>
      </div>`;
    });
    out += '</div>';
  }

  /* 본문 */
  out += curPlan === '12' ? render12(d) : render36(d);
  out += buildTail(d);

  body.innerHTML = out;

  /* 이벤트 바인딩 */
  document.querySelectorAll('.plan-tab').forEach(el => {
    el.addEventListener('click', () => {
      curPlan = el.dataset.plan; curRound = 0; curTypeA = true; render();
    });
  });
  document.querySelectorAll('.type-tab').forEach(el => {
    el.addEventListener('click', () => {
      curTypeA = el.dataset.type === 'A'; render();
    });
  });
  document.querySelectorAll('.vtab').forEach(el => {
    el.addEventListener('click', () => {
      curRound = +el.dataset.round; render();
    });
  });
}

/* ────────────────── 초기화 (DOM 준비 후) ────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  /* 드롭다운 토글 */
  document.getElementById('catBtn').addEventListener('click', () => {
    isOpen ? closeDrop() : openDrop();
  });
  document.addEventListener('click', e => {
    if(isOpen && !document.getElementById('catBtn').contains(e.target)
               && !document.getElementById('catDrop').contains(e.target)){
      closeDrop();
    }
  });

  /* 초기 렌더 */
  const initD = DATA[curCat];
  curPlan = initD?.onlyPlan || '12';
  render();
});

</script>
</body>
</html>
