<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>패키지 플래너 — 경원 AX 허브</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Pretendard',system-ui,sans-serif;background:#f4f6fb;color:#111;min-height:100vh;padding-bottom:32px}
.topbar{background:linear-gradient(135deg,#1428A0,#2563EB);color:#fff;padding:14px 16px 12px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px}
.topbar-back{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;font-family:inherit}
.topbar-title{font-size:15px;font-weight:700}
.topbar-sub{font-size:10px;color:rgba(255,255,255,.75);margin-top:1px}
section{padding:0 14px;margin-top:16px}
.card{background:#fff;border-radius:16px;border:1px solid #e8eaf0;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.section-title{font-size:13px;font-weight:700;color:#1428A0;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.step-badge{background:#1428A0;color:#fff;border-radius:6px;padding:2px 7px;font-size:10px;font-weight:700}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mode-btn{border:2px solid #e8eaf0;border-radius:14px;padding:16px 12px;background:#fff;cursor:pointer;text-align:center;transition:all .2s;font-family:inherit}
.mode-btn.active{border-color:#1428A0;background:#f0f3ff}
.mode-btn .mode-icon{font-size:28px;margin-bottom:6px}
.mode-btn .mode-label{font-size:12px;font-weight:700;color:#111}
.mode-btn .mode-desc{font-size:10px;color:#666;margin-top:3px;line-height:1.4}
.pyeong-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.pyeong-btn{border:1.5px solid #e8eaf0;border-radius:10px;padding:8px 4px;background:#fff;cursor:pointer;text-align:center;font-family:inherit;transition:all .2s}
.pyeong-btn.active{border-color:#1428A0;background:#f0f3ff}
.pyeong-btn .pyeong-num{font-size:14px;font-weight:800;color:#1428A0}
.pyeong-btn .pyeong-label{font-size:9px;color:#888;margin-top:1px}
.apt-input{width:100%;border:1.5px solid #e8eaf0;border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit;outline:none;margin-bottom:10px}
.apt-input:focus{border-color:#1428A0}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.cat-item{border:1.5px solid #e8eaf0;border-radius:12px;padding:10px 6px;background:#fff;cursor:pointer;text-align:center;transition:all .2s;user-select:none}
.cat-item.selected{border-color:#1428A0;background:#f0f3ff}
.cat-item .cat-icon{font-size:22px;margin-bottom:4px}
.cat-item .cat-name{font-size:10px;font-weight:600;color:#333}
.cat-item .cat-rec{font-size:9px;color:#1428A0;margin-top:2px;font-weight:600;line-height:1.3}
.budget-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.budget-row label{font-size:12px;font-weight:600;color:#444;white-space:nowrap}
.budget-input{flex:1;border:1.5px solid #e8eaf0;border-radius:10px;padding:9px 12px;font-size:16px;font-family:inherit;outline:none;text-align:right;font-weight:700}
.budget-input:focus{border-color:#1428A0}
.budget-unit{font-size:12px;color:#666;white-space:nowrap}
.slider-row{display:flex;align-items:center;gap:8px}
.slider-row label{font-size:12px;font-weight:600;color:#444;white-space:nowrap}
input[type=range]{flex:1;-webkit-appearance:none;height:5px;border-radius:3px;background:#e0e4f0;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#1428A0;cursor:pointer}
.slider-val{font-size:14px;font-weight:800;color:#1428A0;width:32px;text-align:right}
.discount-note{font-size:9px;color:#888;margin-top:6px;line-height:1.4}
.rec-btn{width:100%;padding:15px;border-radius:14px;border:none;background:linear-gradient(135deg,#1428A0,#2563EB);color:#fff;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:4px;letter-spacing:.3px}
.rec-btn:active{opacity:.85}
.summary-card{background:linear-gradient(135deg,#1428A0,#2563EB);border-radius:16px;padding:16px;color:#fff;margin-bottom:12px}
.summary-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.summary-label{font-size:12px;color:rgba(255,255,255,.75)}
.summary-price{font-size:22px;font-weight:800}
.summary-price small{font-size:12px;font-weight:400;margin-left:2px}
.summary-save{background:rgba(255,255,255,.2);border-radius:8px;padding:6px 12px;font-size:12px;text-align:center;font-weight:600}
.result-card{background:#fff;border-radius:16px;border:1px solid #e8eaf0;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.result-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.result-icon{font-size:20px}
.result-cat{font-size:13px;font-weight:700;color:#333}
.model-name{font-size:13px;font-weight:700;color:#111;margin-bottom:2px}
.model-sub{font-size:11px;color:#666;margin-bottom:10px}
.price-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.price-original{font-size:12px;color:#999;text-decoration:line-through}
.price-discounted{font-size:20px;font-weight:800;color:#1428A0}
.price-discounted small{font-size:11px;font-weight:500;margin-left:2px}
.price-save-badge{background:#dcfce7;color:#15803d;font-size:10px;font-weight:700;border-radius:6px;padding:2px 7px}
.specs-wrap{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.spec-tag{background:#f4f6fb;border-radius:6px;padding:3px 8px;font-size:10px;color:#444;font-weight:500}
.spec-tag.flagship{background:#1428A0;color:#fff}
.flagship-section{border-top:1px solid #f0f3f8;padding-top:8px}
.flagship-title{font-size:10px;color:#888;margin-bottom:6px;font-weight:600}
.missing-wrap{display:flex;flex-wrap:wrap;gap:4px}
.missing-tag{background:#fff0f0;border:1px solid #fecaca;border-radius:6px;padding:2px 8px;font-size:9px;color:#dc2626;font-weight:600}
.flagship-info{font-size:10px;color:#888;margin-top:4px}
.flagship-price{color:#1428A0;font-weight:700}
.over-budget{border:1.5px solid #fed7aa}
.over-badge{background:#fff7ed;color:#ea580c;font-size:9px;font-weight:700;border-radius:6px;padding:2px 7px}
.best-badge{background:#dcfce7;color:#15803d;font-size:9px;font-weight:700;border-radius:6px;padding:2px 7px}
.pyeong-rec-note{background:#f0f3ff;border-radius:8px;padding:8px 10px;margin-top:10px;font-size:10px;color:#3b5bdb;line-height:1.5}
.hidden{display:none}
.reset-btn{width:100%;padding:12px;border-radius:12px;border:1.5px solid #e8eaf0;background:#fff;color:#666;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:8px}
</style>
</head>
<body>
<div class="topbar">
  <button class="topbar-back" onclick="history.back()">← 뒤로</button>
  <div>
    <div class="topbar-title">📦 패키지 플래너</div>
    <div class="topbar-sub">평형별 맞춤 가전 패키지 · 삼성닷컴 할인 반영</div>
  </div>
</div>

<section id="sec-mode">
  <div class="card">
    <div class="section-title"><span class="step-badge">STEP 1</span> 추천 방식 선택</div>
    <div class="mode-grid">
      <div class="mode-btn" id="btn-apt" onclick="selectMode('apt')">
        <div class="mode-icon">🏠</div>
        <div class="mode-label">입주 아파트 패키지</div>
        <div class="mode-desc">평형수 기반으로 딱 맞는 용량·크기 자동 설정</div>
      </div>
      <div class="mode-btn" id="btn-budget" onclick="selectMode('budget')">
        <div class="mode-icon">💰</div>
        <div class="mode-label">금액대별 추천</div>
        <div class="mode-desc">원하는 예산 안에서 최적 모델 추천</div>
      </div>
    </div>
  </div>
</section>

<section id="sec-apt" class="hidden">
  <div class="card">
    <div class="section-title"><span class="step-badge">STEP 2</span> 아파트 정보</div>
    <input type="text" class="apt-input" id="apt-name" placeholder="아파트명 입력 (선택사항)">
    <div style="font-size:12px;font-weight:600;color:#444;margin-bottom:8px">평형 선택</div>
    <div class="pyeong-grid">
      <div class="pyeong-btn" onclick="selectPyeong(20)"><div class="pyeong-num">20평</div><div class="pyeong-label">59~66㎡</div></div>
      <div class="pyeong-btn" onclick="selectPyeong(25)"><div class="pyeong-num">25평</div><div class="pyeong-label">82~85㎡</div></div>
      <div class="pyeong-btn" onclick="selectPyeong(33)"><div class="pyeong-num">33평</div><div class="pyeong-label">108~115㎡</div></div>
      <div class="pyeong-btn" onclick="selectPyeong(40)"><div class="pyeong-num">40평</div><div class="pyeong-label">132~145㎡</div></div>
      <div class="pyeong-btn" onclick="selectPyeong(50)"><div class="pyeong-num">50평+</div><div class="pyeong-label">165㎡+</div></div>
    </div>
    <div id="pyeong-rec-note" class="pyeong-rec-note hidden"></div>
  </div>
</section>

<section id="sec-cat" class="hidden">
  <div class="card">
    <div class="section-title"><span id="cat-step-badge" class="step-badge">STEP 2</span> 구매할 품목 선택</div>
    <div class="cat-grid" id="cat-grid"></div>
  </div>
</section>

<section id="sec-budget" class="hidden">
  <div class="card">
    <div class="section-title"><span id="budget-step-badge" class="step-badge">STEP 3</span> 예산 &amp; 삼성닷컴 할인율</div>
    <div class="budget-row">
      <label>총 예산</label>
      <input type="number" class="budget-input" id="budget-input" placeholder="0" min="0" step="10">
      <span class="budget-unit">만원</span>
    </div>
    <div style="height:10px"></div>
    <div class="slider-row">
      <label>삼성닷컴 할인율</label>
      <input type="range" id="discount-slider" min="0" max="30" step="1" value="0" oninput="updateDiscount()">
      <span class="slider-val" id="discount-val">0%</span>
    </div>
    <div class="discount-note">※ 삼성닷컴 카드혜택·기기변경할인·추가쿠폰 등 실제 적용 할인율을 입력하세요</div>
    <div style="height:14px"></div>
    <button class="rec-btn" onclick="recommend()">추천받기 →</button>
  </div>
</section>

<section id="sec-result" class="hidden">
  <div id="summary-card"></div>
  <div id="result-cards"></div>
  <button class="reset-btn" onclick="resetAll()">↺ 다시 설정하기</button>
</section>

  33:{label:'33평 (108~115㎡)',rec:'4인가족·넓은 주방·거실',fridge:{minCap:700,maxCap:905,note:'700~900L'},washer:{minCap:24,maxCap:25,note:'24~25kg'},dryer:{minCap:17,maxCap:20,note:'17~20kg'},tv:{minSize:75,maxSize:85,note:'75~85인치'},aircon:{minCov:19,maxCov:23,note:'19~23평'},dishwasher:{note:'14인용 100℃열풍'},airdresser:{note:'대용량'},robot:{note:'AI스팀 이상'},vacuum:{note:'전 모델'}},
  40:{label:'40평 (132~145㎡)',rec:'4~5인가족·대형 거실',fridge:{minCap:850,maxCap:9999,note:'850L+ (패밀리허브 권장)'},washer:{minCap:25,maxCap:25,note:'25kg'},dryer:{minCap:20,maxCap:20,note:'20kg'},tv:{minSize:83,maxSize:999,note:'83인치+'},aircon:{minCov:22,maxCov:99,note:'22~23평+'},dishwasher:{note:'100℃열풍+정수필터'},airdresser:{note:'H시리즈 9벌'},robot:{note:'AI스팀 울트라'},vacuum:{note:'400W급'}},
  50:{label:'50평+ (165㎡+)',rec:'프리미엄 대형 주거 풀패키지',fridge:{minCap:850,maxCap:9999,note:'패밀리허브 적극 권장'},washer:{minCap:25,maxCap:25,note:'25kg 원바디 최상위'},dryer:{minCap:20,maxCap:20,note:'20kg'},tv:{minSize:83,maxSize:999,note:'83인치+ OLED 권장'},aircon:{minCov:22,maxCov:99,note:'23평+ 갤러리프로'},dishwasher:{note:'100℃열풍+정수필터'},airdresser:{note:'크리스탈미러'},robot:{note:'직배수 울트라'},vacuum:{note:'400W 고온물걸레'}},
};

const WEIGHTS={fridge:.22,washer:.20,dryer:.09,tv:.18,aircon:.13,dishwasher:.06,airdresser:.07,robot:.06,vacuum:.05};
let state={mode:null,pyeong:null,selected:new Set(),budget:0,discount:0};

function selectMode(m){
  state.mode=m;
  document.getElementById('btn-apt').classList.toggle('active',m==='apt');
  document.getElementById('btn-budget').classList.toggle('active',m==='budget');
  if(m==='apt'){
    show('sec-apt');
    document.getElementById('cat-step-badge').textContent='STEP 3';
    document.getElementById('budget-step-badge').textContent='STEP 4';
  } else {
    hide('sec-apt');
    document.getElementById('cat-step-badge').textContent='STEP 2';
    document.getElementById('budget-step-badge').textContent='STEP 3';
    state.pyeong=null;
    buildCatGrid(null);
    show('sec-cat');show('sec-budget');
  }
  hide('sec-result');
}

function selectPyeong(p){
  state.pyeong=p;
  document.querySelectorAll('.pyeong-btn').forEach((b,i)=>{
    b.classList.toggle('active',[20,25,33,40,50][i]===p);
  });
  const rule=PYEONG_RULES[p];
  const note=document.getElementById('pyeong-rec-note');
  note.innerHTML='<b>📐 '+rule.label+'</b><br>'+rule.rec;
  note.classList.remove('hidden');
  buildCatGrid(p);
  show('sec-cat');show('sec-budget');hide('sec-result');
}

function buildCatGrid(pyeong){
  const rule=pyeong?PYEONG_RULES[pyeong]:null;
  if(pyeong){state.selected.clear();}
  const grid=document.getElementById('cat-grid');
  grid.innerHTML=CATEGORIES.map(c=>{
    const def=pyeong&&c.step;
    if(def)state.selected.add(c.id);
    const sel=state.selected.has(c.id);
    const recNote=rule&&rule[c.id]?rule[c.id].note:'';
    return '<div class="cat-item'+(sel?' selected':'')+'" id="cat-'+c.id+'" onclick="toggleCat(\''+c.id+'\')"><div class="cat-icon">'+c.icon+'</div><div class="cat-name">'+c.name+'</div>'+(recNote?'<div class="cat-rec">'+recNote+'</div>':'')+'</div>';
  }).join('');
}

function toggleCat(id){
  const el=document.getElementById('cat-'+id);
  if(state.selected.has(id)){state.selected.delete(id);el.classList.remove('selected');}
  else{state.selected.add(id);el.classList.add('selected');}
}

function updateDiscount(){
  const v=document.getElementById('discount-slider').value;
  document.getElementById('discount-val').textContent=v+'%';
  state.discount=+v;
}

function show(id){document.getElementById(id).classList.remove('hidden');}
function hide(id){document.getElementById(id).classList.add('hidden');}

function getCatBudget(id,total){
  const sel=[...state.selected];
  const tw=sel.reduce((s,k)=>s+(WEIGHTS[k]||.07),0);
  return Math.round(total*((WEIGHTS[id]||.07)/tw));
}

function pickFlagshipForSize(pyeong){
  // TV 플래그십을 평형에 맞는 사이즈의 OLED로 결정
  const rule=pyeong?PYEONG_RULES[pyeong].tv:null;
  if(!rule) return FLAGSHIP.tv;
  const minS=rule.minSize||55;
  if(minS>=83) return {model:'KQ83SH95AFXKR',name:'OLED SH95 83인치',price:890,specs:FLAGSHIP.tv.specs};
  if(minS>=75) return {model:'KQ77SH95AFXKR',name:'OLED SH95 77인치',price:590,specs:FLAGSHIP.tv.specs};
  if(minS>=65) return {model:'KQ65SH95AFXKR',name:'OLED SH95 65인치',price:449,specs:FLAGSHIP.tv.specs};
  return {model:'KQ55SH93AFXKR',name:'OLED SH93 55인치',price:259,specs:FLAGSHIP.tv.specs};
}

function recommend(){
  state.budget=+(document.getElementById('budget-input').value)||0;
  if(state.selected.size===0){alert('품목을 1개 이상 선택해주세요');return;}
  const disc=state.discount/100;
  const results=[];

  CATEGORIES.forEach(cat=>{
    if(!state.selected.has(cat.id))return;
    const products=DB[cat.id];
    if(!products)return;
    const flagship=cat.id==='tv'?pickFlagshipForSize(state.pyeong):FLAGSHIP[cat.id];
    let candidates=[...products];
    const rule=state.pyeong?PYEONG_RULES[state.pyeong][cat.id]:null;
    if(rule){
      let f=null;
      if(cat.id==='fridge'&&rule.minCap) f=products.filter(p=>p.cap>=rule.minCap&&p.cap<=rule.maxCap);
      else if(cat.id==='washer'&&rule.minCap) f=products.filter(p=>p.cap>=rule.minCap&&p.cap<=rule.maxCap);
      else if(cat.id==='dryer'&&rule.minCap) f=products.filter(p=>p.cap>=rule.minCap&&p.cap<=rule.maxCap);
      else if(cat.id==='tv'&&rule.minSize) f=products.filter(p=>p.size>=rule.minSize&&p.size<=rule.maxSize);
      else if(cat.id==='aircon'&&rule.minCov) f=products.filter(p=>p.cov>=rule.minCov&&p.cov<=rule.maxCov);
      if(f&&f.length>0) candidates=f;
    }
    const catBudget=state.budget>0?getCatBudget(cat.id,state.budget):Infinity;
    const affordable=candidates.filter(p=>p.price*(1-disc)<=catBudget);
    let rec=null;
    if(affordable.length>0) rec=affordable.reduce((b,p)=>p.price>b.price?p:b,affordable[0]);
    else rec=candidates.reduce((b,p)=>p.price<b.price?p:b,candidates[0]);
    if(!rec)return;
    const recSpecs=new Set(rec.specs||[]);
    const missingSpecs=(flagship?flagship.specs:[]).filter(s=>!recSpecs.has(s));
    const isFlagship=flagship&&rec.model===flagship.model;
    const overBudget=catBudget<Infinity&&rec.price*(1-disc)>catBudget;
    results.push({cat,rec,flagship,missingSpecs,isFlagship,overBudget,disc,catBudget});
  });

  renderResults(results);
  show('sec-result');
  document.getElementById('sec-result').scrollIntoView({behavior:'smooth'});
}

function renderResults(results){
  let totO=0,totD=0;
  results.forEach(r=>{totO+=r.rec.price;totD+=r.rec.price*(1-r.disc);});
  const saved=totO-totD;
  let sh='<div class="summary-card"><div class="summary-row"><div class="summary-label">총 출시가 합계</div><div style="font-size:13px;color:rgba(255,255,255,.7);text-decoration:line-through">'+Math.round(totO).toLocaleString()+'만원</div></div><div class="summary-row"><div class="summary-label">삼성닷컴 할인 적용가</div><div class="summary-price">'+Math.round(totD).toLocaleString()+'<small>만원</small></div></div>';
  if(state.discount>0) sh+='<div class="summary-save">💰 '+state.discount+'% 할인 → '+Math.round(saved).toLocaleString()+'만원 절약</div>';
  if(state.budget>0){
    const diff=totD-state.budget;
    const col=diff<=0?'#86efac':'#fca5a5';
    const msg=diff<=0?'✅ 예산보다 '+Math.round(-diff).toLocaleString()+'만원 여유':'⚠️ 예산 대비 '+Math.round(diff).toLocaleString()+'만원 초과';
    sh+='<div style="margin-top:8px;background:rgba(255,255,255,.15);border-radius:8px;padding:6px 12px;font-size:11px;color:'+col+';font-weight:600">'+msg+'</div>';
  }
  sh+='</div>';
  document.getElementById('summary-card').innerHTML=sh;

  const aptName=state.mode==='apt'?(document.getElementById('apt-name').value||''):'';
  const titleNote=aptName?'<div style="font-size:11px;color:#888;margin-bottom:8px">🏠 '+aptName+(state.pyeong?' · '+state.pyeong+'평':'')+'</div>':'';

  document.getElementById('result-cards').innerHTML=titleNote+results.map(r=>{
    const {cat,rec,flagship,missingSpecs,isFlagship,overBudget,disc}=r;
    const dp=Math.round(rec.price*(1-disc));
    let h='<div class="result-card'+(overBudget?' over-budget':'')+'"><div class="result-header"><span class="result-icon">'+cat.icon+'</span><span class="result-cat">'+cat.name+'</span>';
    if(isFlagship) h+='<span class="best-badge">🏆 플래그십</span>';
    if(overBudget) h+='<span class="over-badge">예산초과</span>';
    h+='</div><div class="model-name">'+rec.name+'</div><div class="model-sub">'+rec.model+' · '+rec.year+'년형</div><div class="price-row">';
    if(disc>0) h+='<span class="price-original">'+rec.price+'만원</span>';
    h+='<span class="price-discounted">'+dp+'<small>만원</small></span>';
    if(disc>0) h+='<span class="price-save-badge">'+state.discount+'%↓</span>';
    h+='</div>';
    if(rec.specs&&rec.specs.length>0){
      h+='<div class="specs-wrap">';
      rec.specs.forEach(s=>{
        const isF=flagship&&flagship.specs.includes(s);
        h+='<span class="spec-tag'+(isF?' flagship':'')+'">'+s+'</span>';
      });
      h+='</div>';
    }
    if(!isFlagship&&flagship&&missingSpecs.length>0){
      h+='<div class="flagship-section"><div class="flagship-title">'+flagship.name+' 대비 없는 기능</div><div class="missing-wrap">';
      missingSpecs.forEach(s=>{h+='<span class="missing-tag">✕ '+s+'</span>';});
      h+='</div><div class="flagship-info">플래그십 출시가: <span class="flagship-price">'+flagship.price+'만원</span>'+(disc>0?' (할인 시 약 '+Math.round(flagship.price*(1-disc))+'만원)':'')+'</div></div>';
    } else if(isFlagship){
      h+='<div class="flagship-section"><div style="font-size:10px;color:#1428A0;font-weight:600">🏆 카테고리 최고 사양 선택됨</div></div>';
    }
    h+='</div>';
    return h;
  }).join('');
}

function resetAll(){
  state={mode:null,pyeong:null,selected:new Set(),budget:0,discount:0};
  ['btn-apt','btn-budget'].forEach(id=>document.getElementById(id).classList.remove('active'));
  document.getElementById('budget-input').value='';
  document.getElementById('discount-slider').value=0;
  document.getElementById('discount-val').textContent='0%';
  ['sec-apt','sec-cat','sec-budget','sec-result'].forEach(id=>hide(id));
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
