<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>패키지 플래너 — 경원 AX 허브</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Pretendard',system-ui,sans-serif;background:#f4f6fb;color:#111;min-height:100vh;padding-bottom:40px}
.topbar{background:linear-gradient(135deg,#1428A0,#2563EB);color:#fff;padding:14px 16px 12px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px}
.topbar-back{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;font-family:inherit}
.topbar-title{font-size:15px;font-weight:700}
.topbar-sub{font-size:10px;color:rgba(255,255,255,.75);margin-top:1px}
section{padding:0 14px;margin-top:14px}
.card{background:#fff;border-radius:16px;border:1px solid #e8eaf0;padding:16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.section-title{font-size:13px;font-weight:700;color:#1428A0;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.step-badge{background:#1428A0;color:#fff;border-radius:6px;padding:2px 7px;font-size:10px;font-weight:700}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mode-btn{border:2px solid #e8eaf0;border-radius:14px;padding:16px 12px;background:#fff;cursor:pointer;text-align:center;transition:all .2s;font-family:inherit}
.mode-btn.active{border-color:#1428A0;background:#f0f3ff}
.mode-icon{font-size:28px;margin-bottom:6px}
.mode-label{font-size:12px;font-weight:700;color:#111}
.mode-desc{font-size:10px;color:#666;margin-top:3px;line-height:1.4}
.pyeong-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.pyeong-btn{border:1.5px solid #e8eaf0;border-radius:10px;padding:8px 4px;background:#fff;cursor:pointer;text-align:center;font-family:inherit;transition:all .2s}
.pyeong-btn.active{border-color:#1428A0;background:#f0f3ff}
.pyeong-num{font-size:14px;font-weight:800;color:#1428A0}
.pyeong-label{font-size:9px;color:#888;margin-top:1px}
.apt-input{width:100%;border:1.5px solid #e8eaf0;border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit;outline:none;margin-bottom:10px}
.apt-input:focus{border-color:#1428A0}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.cat-item{border:1.5px solid #e8eaf0;border-radius:12px;padding:10px 6px;background:#fff;cursor:pointer;text-align:center;transition:all .2s;user-select:none}
.cat-item.selected{border-color:#1428A0;background:#f0f3ff}
.cat-icon{font-size:22px;margin-bottom:4px}
.cat-name{font-size:10px;font-weight:600;color:#333}
.cat-rec{font-size:9px;color:#1428A0;margin-top:2px;font-weight:600;line-height:1.3}
.budget-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.budget-row label{font-size:12px;font-weight:600;color:#444;white-space:nowrap}
.budget-input{flex:1;border:1.5px solid #e8eaf0;border-radius:10px;padding:9px 12px;font-size:16px;font-family:inherit;outline:none;text-align:right;font-weight:700}
.budget-input:focus{border-color:#1428A0}
.budget-unit{font-size:12px;color:#666;white-space:nowrap}
.slider-row{display:flex;align-items:center;gap:8px}
.slider-row label{font-size:12px;font-weight:600;color:#444;white-space:nowrap}
input[type=range]{flex:1;-webkit-appearance:none;height:5px;border-radius:3px;background:#e0e4f0;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#1428A0;cursor:pointer}
.slider-val{font-size:14px;font-weight:800;color:#1428A0;width:32px;text-align:right}
.discount-note{font-size:9px;color:#888;margin-top:6px;line-height:1.4}
.rec-btn{width:100%;padding:15px;border-radius:14px;border:none;background:linear-gradient(135deg,#1428A0,#2563EB);color:#fff;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:4px}
.rec-btn:active{opacity:.85}
.pyeong-rec-note{background:#f0f3ff;border-radius:8px;padding:8px 10px;margin-top:10px;font-size:10px;color:#3b5bdb;line-height:1.5}
.hidden{display:none}
.reset-btn{width:100%;padding:12px;border-radius:12px;border:1.5px solid #e8eaf0;background:#fff;color:#666;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:8px}

/* 요약 카드 */
.summary-card{background:linear-gradient(135deg,#1428A0,#2563EB);border-radius:16px;padding:16px;color:#fff;margin-bottom:12px}
.summary-total{font-size:26px;font-weight:800;margin:2px 0}
.summary-label{font-size:11px;color:rgba(255,255,255,.7)}
.summary-pill{display:inline-block;background:rgba(255,255,255,.2);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:600;margin-top:6px}
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
.summary-item{background:rgba(255,255,255,.1);border-radius:10px;padding:8px;text-align:center}
.summary-item-num{font-size:16px;font-weight:800}
.summary-item-label{font-size:9px;color:rgba(255,255,255,.7);margin-top:2px}

/* 카테고리 결과 카드 */
.cat-result{background:#fff;border-radius:18px;border:1px solid #e8eaf0;margin-bottom:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.cat-result-header{display:flex;align-items:center;gap:10px;padding:14px 14px 10px}
.cat-result-icon{font-size:22px}
.cat-result-name{font-size:14px;font-weight:800;color:#111}
.cat-result-rule{font-size:10px;color:#888;margin-top:1px}
.tier-tabs{display:flex;border-bottom:1px solid #f0f3f8;padding:0 14px}
.tier-tab{flex:1;text-align:center;padding:7px 0;font-size:11px;font-weight:700;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;color:#aaa}
.tier-tab.active{color:#1428A0;border-bottom-color:#1428A0}
.tier-tab.gold{color:#B45309}
.tier-tab.gold.active{color:#92400E;border-bottom-color:#D97706}
.tier-tab.green{color:#057A55}
.tier-tab.green.active{color:#065F46;border-bottom-color:#059669}
.tier-content{padding:12px 14px 14px}

/* 티어 카드 내부 */
.tier-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;border-radius:7px;padding:3px 9px;margin-bottom:8px}
.badge-flagship{background:#FEF3C7;color:#92400E;border:1px solid #FDE68A}
.badge-rec{background:#ECFDF5;color:#065F46;border:1px solid #A7F3D0}
.badge-budget{background:#F3F4F6;color:#374151;border:1px solid #E5E7EB}
.model-title{font-size:13px;font-weight:700;color:#111;margin-bottom:1px;line-height:1.4}
.model-code{font-size:10px;color:#999;margin-bottom:8px}

/* 핵심 스펙 하이라이트 */
.key-stat-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.key-stat{background:#f0f3ff;border-radius:8px;padding:4px 10px;text-align:center}
.key-stat-val{font-size:16px;font-weight:800;color:#1428A0}
.key-stat-label{font-size:9px;color:#666;margin-top:1px}

/* 가격 */
.price-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.price-orig{font-size:11px;color:#bbb;text-decoration:line-through}
.price-disc{font-size:20px;font-weight:800;color:#1428A0}
.price-disc small{font-size:11px;font-weight:500}
.price-save{background:#ECFDF5;color:#065F46;font-size:10px;font-weight:700;border-radius:6px;padding:2px 7px}

/* 스펙 태그 */
.spec-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.spec-tag{background:#f4f6fb;border-radius:6px;padding:3px 8px;font-size:10px;color:#444;font-weight:500}
.spec-tag.flagship{background:#1428A0;color:#fff}
.spec-tag.flagonly{background:#FEF3C7;color:#92400E;border:1px solid #FDE68A}

/* 빠진 기능 */
.missing-section{border-top:1px dashed #f0f3f8;padding-top:8px;margin-top:4px}
.missing-title{font-size:10px;color:#888;font-weight:600;margin-bottom:5px}
.missing-tags{display:flex;flex-wrap:wrap;gap:4px}
.missing-tag{background:#FFF5F5;border:1px solid #FED7D7;border-radius:6px;padding:2px 8px;font-size:9px;color:#C53030;font-weight:600}
.flagship-ref{font-size:10px;color:#888;margin-top:6px}
.flagship-ref span{color:#1428A0;font-weight:700}

/* 플래그십 탭 특수 */
.tier-content.gold-bg{background:#FFFBF0}
.tier-content.green-bg{background:#F0FFF8}
.flagship-crown{font-size:11px;color:#92400E;font-weight:700;margin-bottom:6px}

/* 비교 비율 바 */
.compare-bar-wrap{margin-top:8px}
.compare-bar-label{font-size:10px;color:#888;margin-bottom:3px;display:flex;justify-content:space-between}
.compare-bar-track{height:6px;background:#f0f3f8;border-radius:3px;overflow:hidden}
.compare-bar-fill{height:100%;border-radius:3px;transition:width .5s}

/* 에어컨 등급 뱃지 */
.grade-badge{display:inline-block;font-size:10px;font-weight:700;border-radius:6px;padding:2px 8px;margin-left:6px}
.grade-1{background:#dcfce7;color:#166534}
.grade-2{background:#fef9c3;color:#854d0e}

/* 접기/펼치기 버튼 */
.toggle-btn{width:100%;padding:8px;border:none;background:#f4f6fb;color:#666;font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;border-top:1px solid #f0f3f8}
</style>
</head>
<body>

<div class="topbar">
  <button class="topbar-back" onclick="history.back()">← 뒤로</button>
  <div>
    <div class="topbar-title">📦 패키지 플래너</div>
    <div class="topbar-sub">평형별 맞춤 가전 패키지 · 삼성닷컴 할인 반영</div>
  </div>
</div>

<section id="sec-mode">
  <div class="card">
    <div class="section-title"><span class="step-badge">STEP 1</span> 추천 방식 선택</div>
    <div class="mode-grid">
      <div class="mode-btn" id="btn-apt" onclick="selectMode('apt')">
        <div class="mode-icon">🏠</div>
        <div class="mode-label">입주 아파트 패키지</div>
        <div class="mode-desc">평형수 기반으로 용량·크기 자동 설정</div>
      </div>
      <div class="mode-btn" id="btn-budget" onclick="selectMode('budget')">
        <div class="mode-icon">💰</div>
        <div class="mode-label">금액대별 추천</div>
        <div class="mode-desc">예산 안에서 3단계 옵션 제시</div>
      </div>
    </div>
  </div>
</section>

<section id="sec-apt" class="hidden">
  <div class="card">
    <div class="section-title"><span class="step-badge">STEP 2</span> 아파트 정보</div>
    <input type="text" class="apt-input" id="apt-name" placeholder="아파트명 입력 (선택사항)">
    <div style="font-size:12px;font-weight:600;color:#444;margin-bottom:8px">평형 선택</div>
    <div class="pyeong-grid">
      <div class="pyeong-btn" onclick="selectPyeong(20)"><div class="pyeong-num">20평</div><div class="pyeong-label">59~66㎡</div></div>
      <div class="pyeong-btn" onclick="selectPyeong(25)"><div class="pyeong-num">25평</div><div class="pyeong-label">82~85㎡</div></div>
      <div class="pyeong-btn" onclick="selectPyeong(33)"><div class="pyeong-num">33평</div><div class="pyeong-label">108~115㎡</div></div>
      <div class="pyeong-btn" onclick="selectPyeong(40)"><div class="pyeong-num">40평</div><div class="pyeong-label">132~145㎡</div></div>
      <div class="pyeong-btn" onclick="selectPyeong(50)"><div class="pyeong-num">50평+</div><div class="pyeong-label">165㎡+</div></div>
    </div>
    <div id="pyeong-rec-note" class="pyeong-rec-note hidden"></div>
  </div>
</section>

<section id="sec-cat" class="hidden">
  <div class="card">
    <div class="section-title"><span id="cat-step-badge" class="step-badge">STEP 2</span> 구매할 품목 선택</div>
    <div class="cat-grid" id="cat-grid"></div>
  </div>
</section>

<section id="sec-budget" class="hidden">
  <div class="card">
    <div class="section-title"><span id="budget-step-badge" class="step-badge">STEP 3</span> 예산 &amp; 삼성닷컴 할인율</div>
    <div class="budget-row">
      <label>총 예산</label>
      <input type="number" class="budget-input" id="budget-input" placeholder="0" min="0" step="50">
      <span class="budget-unit">만원</span>
    </div>
    <div style="height:10px"></div>
    <div class="slider-row">
      <label>삼성닷컴 할인율</label>
      <input type="range" id="discount-slider" min="0" max="30" step="1" value="0" oninput="updateDiscount()">
      <span class="slider-val" id="discount-val">0%</span>
    </div>
    <div class="discount-note">※ 삼성닷컴 카드혜택·기기변경할인·추가쿠폰 등 실제 적용 할인율을 입력하세요</div>
    <div style="height:14px"></div>
    <button class="rec-btn" onclick="recommend()">STEP 4 — 추천 결과 보기 →</button>
  </div>
</section>

<section id="sec-result" class="hidden">
  <div id="summary-card"></div>
  <div id="result-cards"></div>
  <button class="reset-btn" onclick="resetAll()">↺ 다시 설정하기</button>
</section>

<script>
// ===== 카테고리 정의 =====
const CATEGORIES=[
  {id:'fridge',icon:'🧊',name:'냉장고',step:true,keyAttr:{key:'cap',unit:'L',label:'용량'}},
  {id:'washer',icon:'🫧',name:'세탁기/콤보',step:true,keyAttr:{fn:p=>p.cap+'kg',label:'세탁용량'}},
  {id:'dryer',icon:'💨',name:'건조기(별도)',step:false,keyAttr:{key:'cap',unit:'kg',label:'건조용량'}},
  {id:'tv',icon:'📺',name:'TV',step:true,keyAttr:{fn:p=>p.size+'인치',label:'화면크기'}},
  {id:'aircon',icon:'❄️',name:'에어컨',step:true,keyAttr:{fn:p=>p.cov+'평형',label:'냉방평수'}},
  {id:'dishwasher',icon:'🍽️',name:'식기세척기',step:false,keyAttr:{fn:p=>p.induction||'14인용',label:'수납용량'}},
  {id:'airdresser',icon:'👔',name:'에어드레서',step:false,keyAttr:{fn:p=>p.name.includes('9벌')?'5~9벌':p.name.includes('5벌')?'최대5벌':'3~5벌',label:'의류수납'}},
  {id:'robot',icon:'🤖',name:'로봇청소기',step:false,keyAttr:{fn:p=>p.specs.includes('직배수전용')?'직배수':'자동급배수',label:'배수방식'}},
  {id:'vacuum',icon:'🌀',name:'무선청소기',step:false,keyAttr:{fn:p=>(p.specs[0]||'').split('고출력')[0].split('W')[0]+'W',label:'모터출력'}},
  // ── CE 신규 ──
  {id:'airpurifier',icon:'🌬️',name:'공기청정기',step:false,keyAttr:{fn:p=>p.area+'㎡',label:'적용면적'}},
  {id:'microwave',icon:'🍳',name:'전자레인지/오븐',step:false,keyAttr:{fn:p=>p.vol+'L',label:'용량'}},
  {id:'soundbar',icon:'🔊',name:'사운드바',step:false,keyAttr:{fn:p=>p.ch,label:'채널구성'}},
  // ── MX 신규 ──
  {id:'laptop',icon:'💻',name:'PC/노트북',step:false,keyAttr:{fn:p=>p.size+'인치',label:'화면크기'}},
  {id:'tablet',icon:'📱',name:'태블릿',step:false,keyAttr:{fn:p=>p.size+'인치',label:'화면크기'}},
  {id:'phone',icon:'📲',name:'휴대폰',step:false,keyAttr:{fn:p=>p.name.split(' ')[0],label:'시리즈'}},
  {id:'wearable',icon:'⌚',name:'웨어러블',step:false,keyAttr:{fn:p=>p.type,label:'구성'}},
];

// ===== 플래그십 정의 =====
const FLAGSHIP={
  fridge:{model:'RM90H91B1W',name:'패밀리허브 864L',price:584,specs:['AI하이브리드쿨링','패밀리허브(터치스크린+AI)','AI비전인사이드','UV살균탈취','오토오픈도어','메탈쿨링','위스키볼아이스']},
  washer:{model:'WH90F2522AAHY',name:'AI원바디 Top-Fit 25/22kg',price:435,specs:['7인치LCD터치','세제자동투입','오토오픈도어','AI세탁건조','AI소음저감','펫케어코스']},
  dryer:{model:'DV20DG8890BW',name:'20kg 히트펌프건조 2025',price:199,specs:['AI맞춤건조','히트펌프건조','오토오픈도어','공간제습','세탁기연동컨트롤']},
  tv:{model:'KQ77SH95AFXKR',name:'OLED SH95 77인치',price:590,specs:['OLED패널','AI프로세서(NQ8)','돌비애트모스','오브젝트트래킹사운드','무반사매트디스플레이']},
  aircon:{model:'AF90H23D27SS',name:'갤러리프로 스탠드 23평 1등급',price:499,specs:['무풍냉방','AI모션바람(재실자감지)','AI열교환기세척','UV팬살균','AI음성인식(빅스비)','쾌적제습']},
  dishwasher:{model:'DW80F75K1UWW',name:'100℃열풍건조+ 정수필터 14인용',price:149,specs:['100℃열풍건조+','정수필터내장','AI맞춤세척','오토오픈도어','스팀살균','3단선반','빅스비음성인식','히든터치']},
  airdresser:{model:'DF90H24R5C',name:'AI에어드레서 크리스탈미러 H2026',price:250,specs:['주름집중케어존(2026신기술)','듀얼에어워시','듀얼제트스팀','AI건조','폴딩멀티행어','LCD중앙터치','크리스탈미러도어','트리플집진필터']},
  robot:{model:'VR90F01SAGS',name:'AI스팀 울트라 직배수 VR90F',price:204,specs:['스팀물걸레살균','자동급배수','직배수(별도배관)','AI바닥인식','AI사물인식(장애물회피)','사이드팝아웃브러시','청정스테이션스팀세척','먼지자동비움']},

const WEIGHTS={fridge:.22,washer:.20,dryer:.09,tv:.18,aircon:.13,dishwasher:.06,airdresser:.07,robot:.06,vacuum:.05,airpurifier:.05,microwave:.03,soundbar:.04,laptop:.10,tablet:.07,phone:.08,wearable:.05};

let state={mode:null,pyeong:null,selected:new Set(),budget:0,discount:0};
let activeTiers={};

// ===== 헬퍼 =====
function show(id){document.getElementById(id).classList.remove('hidden');}
function hide(id){document.getElementById(id).classList.add('hidden');}

function getCatBudget(id){
  if(state.budget<=0)return Infinity;
  const sel=[...state.selected];
  const tw=sel.reduce((s,k)=>s+(WEIGHTS[k]||.07),0);
  return Math.round(state.budget*((WEIGHTS[id]||.07)/tw));
}

function applyFilter(catId,products){
  const rule=state.pyeong?PYEONG_RULES[state.pyeong]:null;
  if(!rule)return products;
  let f=null;
  if(catId==='fridge'&&rule.fridge) f=products.filter(p=>p.cap>=rule.fridge.minCap&&p.cap<=rule.fridge.maxCap);
  else if(catId==='washer'&&rule.washer) f=products.filter(p=>p.cap>=rule.washer.minCap&&p.cap<=rule.washer.maxCap);
  else if(catId==='dryer'&&rule.dryer) f=products.filter(p=>p.cap>=rule.dryer.minCap&&p.cap<=rule.dryer.maxCap);
  else if(catId==='tv'&&rule.tv) f=products.filter(p=>p.size>=rule.tv.minSize&&p.size<=rule.tv.maxSize);
  else if(catId==='aircon'&&rule.aircon) f=products.filter(p=>p.cov>=rule.aircon.minCov&&p.cov<=rule.aircon.maxCov);
  return(f&&f.length>0)?f:products;
}

function getKeyStat(cat,product){
  const a=cat.keyAttr;
  if(a.key&&product[a.key]!=null)return product[a.key]+a.unit;
  if(a.fn)return a.fn(product);
  return '';
}

function discPrice(p){return Math.round(p*(1-state.discount/100));}

function getMissingSpecs(rec,flagship){
  if(!flagship)return[];
  const s=new Set(rec.specs||[]);
  return flagship.specs.filter(sp=>!s.has(sp));
}

// TV 사이즈별 플래그십
function getTvFlagship(){
  const r=state.pyeong?PYEONG_RULES[state.pyeong]:null;
  const min=r?r.tv.minSize:55;
  if(min>=83)return{...FLAGSHIP.tv,model:'KQ83SH95AFXKR',name:'OLED SH95 83인치',price:890};
  if(min>=75)return FLAGSHIP.tv; // 77인치 SH95
  if(min>=65)return{...FLAGSHIP.tv,model:'KQ65SH95AFXKR',name:'OLED SH95 65인치',price:449};
  return{...FLAGSHIP.tv,model:'KQ55SH93AFXKR',name:'OLED SH93 55인치',price:259};
}

// 3티어 추출
function getThreeTiers(catId){
  const products=DB[catId];
  if(!products)return null;
  const flagship=catId==='tv'?getTvFlagship():FLAGSHIP[catId];
  const cands=applyFilter(catId,products).sort((a,b)=>b.price-a.price);
  const catBudget=getCatBudget(catId);
  const disc=state.discount/100;

  const premium=cands[0];
  const budgetPick=cands[cands.length-1];
  const affordable=cands.filter(p=>p.price*(1-disc)<=catBudget);
  let recommended;
  if(affordable.length>0){
    recommended=affordable[0];
  }else{
    recommended=budgetPick;
  }

  // 3개가 같지 않게
  let trio=[premium,recommended,budgetPick];
  // recommended = premium인 경우 중간에서 하나 선택
  if(trio[0].model===trio[1].model && cands.length>1){
    trio[1]=cands[Math.min(1,cands.length-1)];
  }
  if(trio[1].model===trio[2].model && cands.length>1){
    trio[2]=cands[cands.length-1];
  }

  return {premium:trio[0],recommended:trio[1],budget:trio[2],flagship,catBudget,cands};
}

// ===== UI =====
function selectMode(m){
  state.mode=m;
  document.getElementById('btn-apt').classList.toggle('active',m==='apt');
  document.getElementById('btn-budget').classList.toggle('active',m==='budget');
  if(m==='apt'){
    show('sec-apt');
    document.getElementById('cat-step-badge').textContent='STEP 3';
    document.getElementById('budget-step-badge').textContent='STEP 4';
  }else{
    hide('sec-apt');
    document.getElementById('cat-step-badge').textContent='STEP 2';
    document.getElementById('budget-step-badge').textContent='STEP 3';
    state.pyeong=null;
    buildCatGrid();
    show('sec-cat');show('sec-budget');
  }
  hide('sec-result');
}

function selectPyeong(p){
  state.pyeong=p;
  document.querySelectorAll('.pyeong-btn').forEach((b,i)=>b.classList.toggle('active',[20,25,33,40,50][i]===p));
  const rule=PYEONG_RULES[p];
  document.getElementById('pyeong-rec-note').innerHTML='<b>📐 '+rule.label+'</b> — '+rule.rec;
  document.getElementById('pyeong-rec-note').classList.remove('hidden');
  buildCatGrid(true);
  show('sec-cat');show('sec-budget');hide('sec-result');
}

function buildCatGrid(resetSel){
  if(resetSel){state.selected.clear();}
  const r=state.pyeong?PYEONG_RULES[state.pyeong]:null;
  const grid=document.getElementById('cat-grid');
  grid.innerHTML=CATEGORIES.map(c=>{
    if(resetSel&&c.step)state.selected.add(c.id);
    const sel=state.selected.has(c.id);
    const note=r&&r.note&&r.note[c.id]?r.note[c.id]:'';
    return '<div class="cat-item'+(sel?' selected':'')+'" id="cat-'+c.id+'" onclick="toggleCat(\''+c.id+'\')"><div class="cat-icon">'+c.icon+'</div><div class="cat-name">'+c.name+'</div>'+(note?'<div class="cat-rec">'+note+'</div>':'')+'</div>';
  }).join('');
}

function toggleCat(id){
  const el=document.getElementById('cat-'+id);
  if(state.selected.has(id)){state.selected.delete(id);el.classList.remove('selected');}
  else{state.selected.add(id);el.classList.add('selected');}
}

function updateDiscount(){
  const v=document.getElementById('discount-slider').value;
  document.getElementById('discount-val').textContent=v+'%';
  state.discount=+v;
}

// ===== STEP 4 렌더 =====
function recommend(){
  state.budget=+(document.getElementById('budget-input').value)||0;
  if(state.selected.size===0){alert('품목을 1개 이상 선택해주세요');return;}
  activeTiers={};
  CATEGORIES.forEach(c=>{if(state.selected.has(c.id))activeTiers[c.id]=1;});

  const results=[];
  let totO=0,totD=0,totS=0;
  CATEGORIES.forEach(cat=>{
    if(!state.selected.has(cat.id))return;
    const tiers=getThreeTiers(cat.id);
    if(!tiers)return;
    const rec=tiers.recommended;
    totO+=rec.price;
    totD+=discPrice(rec.price);
    results.push({cat,tiers});
  });
  totS=totO-totD;

  // 요약
  let sh='<div class="summary-card">';
  sh+='<div class="summary-label">추천 기준 총 출시가 합계</div>';
  if(state.discount>0){
    sh+='<div style="font-size:13px;color:rgba(255,255,255,.6);text-decoration:line-through;margin-top:2px">'+totO.toLocaleString()+'만원</div>';
    sh+='<div class="summary-total">'+totD.toLocaleString()+'<span style="font-size:13px;font-weight:400">만원</span></div>';
    sh+='<div class="summary-pill">💰 '+state.discount+'% 할인 → '+totS.toLocaleString()+'만원 절약</div>';
  }else{
    sh+='<div class="summary-total">'+totO.toLocaleString()+'<span style="font-size:13px;font-weight:400">만원</span></div>';
  }
  if(state.budget>0){
    const diff=totD-state.budget;
    const ok=diff<=0;
    sh+='<div style="margin-top:8px;background:rgba(255,255,255,.15);border-radius:8px;padding:6px 12px;font-size:11px;font-weight:600;color:'+(ok?'#86efac':'#fca5a5')+'">'+(ok?'✅ 예산보다 '+Math.round(-diff).toLocaleString()+'만원 여유':'⚠️ 예산 대비 '+Math.round(diff).toLocaleString()+'만원 초과')+'</div>';
  }
  // 카테고리 요약 그리드
  sh+='<div class="summary-grid">';
  sh+='<div class="summary-item"><div class="summary-item-num">'+results.length+'종</div><div class="summary-item-label">선택 품목</div></div>';
  sh+='<div class="summary-item"><div class="summary-item-num">'+(state.discount>0?totD.toLocaleString():totO.toLocaleString())+'</div><div class="summary-item-label">합계(만원)</div></div>';
  sh+='<div class="summary-item"><div class="summary-item-num">'+(state.budget>0?state.budget.toLocaleString():'무제한')+'</div><div class="summary-item-label">설정 예산</div></div>';
  sh+='</div></div>';
  document.getElementById('summary-card').innerHTML=sh;

  // 카테고리 카드
  const aptName=(state.mode==='apt'&&document.getElementById('apt-name').value)||'';
  let cards='';
  if(aptName){
    cards+='<div style="font-size:11px;color:#888;text-align:center;margin-bottom:8px">🏠 '+aptName+(state.pyeong?' '+state.pyeong+'평':'')+'</div>';
  }
  cards+=results.map(({cat,tiers})=>renderCatCard(cat,tiers)).join('');
  document.getElementById('result-cards').innerHTML=cards;

  show('sec-result');
  document.getElementById('sec-result').scrollIntoView({behavior:'smooth'});
}

function renderCatCard(cat,tiers){
  const {premium,recommended,budget,flagship,catBudget,cands}=tiers;
  const disc=state.discount/100;
  const ruleNote=state.pyeong&&PYEONG_RULES[state.pyeong]&&PYEONG_RULES[state.pyeong].note?PYEONG_RULES[state.pyeong].note[cat.id]:'';

  let h='<div class="cat-result">';
  h+='<div class="cat-result-header">';
  h+='<span class="cat-result-icon">'+cat.icon+'</span>';
  h+='<div><div class="cat-result-name">'+cat.name+'</div>';
  if(ruleNote)h+='<div class="cat-result-rule">📐 권장: '+ruleNote+' · '+cands.length+'개 모델 중 선택</div>';
  h+='</div></div>';

  // 탭
  const tId='tier_'+cat.id;
  h+='<div class="tier-tabs">';
  h+='<div class="tier-tab gold active" id="tab_'+cat.id+'_0" onclick="switchTier(\''+cat.id+'\',0)">🏆 프리미엄</div>';
  h+='<div class="tier-tab green" id="tab_'+cat.id+'_1" onclick="switchTier(\''+cat.id+'\',1)">✅ 추천</div>';
  h+='<div class="tier-tab" id="tab_'+cat.id+'_2" onclick="switchTier(\''+cat.id+'\',2)">💡 알뜰</div>';
  h+='</div>';

  // 프리미엄 탭 내용
  h+='<div id="tc_'+cat.id+'_0" class="tier-content gold-bg">';
  h+=renderTierContent(cat,premium,flagship,'flagship',disc,catBudget);
  h+='</div>';

  // 추천 탭 내용
  h+='<div id="tc_'+cat.id+'_1" class="tier-content green-bg hidden">';
  h+=renderTierContent(cat,recommended,flagship,'recommended',disc,catBudget);
  h+='</div>';

  // 알뜰 탭 내용
  h+='<div id="tc_'+cat.id+'_2" class="tier-content hidden">';
  h+=renderTierContent(cat,budget,flagship,'budget',disc,catBudget);
  h+='</div>';

  h+='</div>';
  return h;
}

function renderTierContent(cat,product,flagship,tier,disc,catBudget){
  const dp=discPrice(product.price);
  const isFlagshipModel=flagship&&product.model===flagship.model;
  const missing=getMissingSpecs(product,flagship);
  const overBudget=catBudget<Infinity&&dp>catBudget;

  let h='';
  // 뱃지
  if(tier==='flagship') h+='<div class="tier-badge badge-flagship">🏆 프리미엄 (최고사양)</div>';
  else if(tier==='recommended') h+='<div class="tier-badge badge-rec">✅ 추천 (예산 최적)</div>';
  else h+='<div class="tier-badge badge-budget">💡 알뜰 (최소 조건)</div>';
  if(overBudget) h+='<span style="font-size:9px;background:#fff7ed;color:#c2410c;border-radius:6px;padding:2px 7px;font-weight:700;margin-left:4px">예산초과</span>';
  if(isFlagshipModel) h+='<span style="font-size:9px;background:#fef3c7;color:#92400e;border-radius:6px;padding:2px 7px;font-weight:700;margin-left:4px">= 플래그십</span>';

  // 모델명
  h+='<div class="model-title">'+product.name+'</div>';
  h+='<div class="model-code">'+product.model+' · '+product.year+'년형</div>';

  // 핵심 스펙 수치 하이라이트
  h+='<div class="key-stat-row">';
  const stat=getKeyStat(cat,product);
  if(stat){
    h+='<div class="key-stat"><div class="key-stat-val">'+stat+'</div><div class="key-stat-label">'+cat.keyAttr.label+'</div></div>';
  }
  // 에어컨 에너지 등급
  if(cat.id==='aircon'&&product.grade){
    h+='<div class="key-stat"><div class="key-stat-val" style="color:'+(product.grade===1?'#166534':'#854d0e')+'">'+(product.grade===1?'1등급':'2등급')+'</div><div class="key-stat-label">에너지등급</div></div>';
  }
  // TV 인치 + 패널
  if(cat.id==='tv'){
    const panel=product.specs.find(s=>s.includes('OLED')||s.includes('QLED')||s.includes('RGB'))||'LCD';
    const ptype=panel.includes('OLED')?'OLED':panel.includes('Micro')?'MicroRGB':panel.includes('Neo')?'NeoQLED':'QLED';
    h+='<div class="key-stat"><div class="key-stat-val" style="font-size:12px">'+ptype+'</div><div class="key-stat-label">패널타입</div></div>';
  }
  h+='</div>';

  // 가격
  h+='<div class="price-row">';
  if(disc>0) h+='<span class="price-orig">'+product.price+'만원</span>';
  h+='<span class="price-disc">'+dp+'<small>만원</small></span>';
  if(disc>0) h+='<span class="price-save">'+state.discount+'%↓</span>';
  if(catBudget<Infinity) h+='<span style="font-size:10px;color:#888">예산내 '+catBudget+'만</span>';
  h+='</div>';

  // 스펙 태그
  if(product.specs&&product.specs.length>0){
    h+='<div class="spec-tags">';
    product.specs.forEach(s=>{
      const isF=flagship&&flagship.specs.includes(s);
      h+='<span class="spec-tag'+(isF?' flagship':'')+'">'+s+'</span>';
    });
    h+='</div>';
  }

  // 플래그십 대비 빠진 기능 (프리미엄 탭에선 숨김, 플래그십 모델이면 숨김)
  if(!isFlagshipModel && missing.length>0){
    h+='<div class="missing-section"><div class="missing-title">'+flagship.name+' 대비 없는 기능 ('+missing.length+'개)</div>';
    h+='<div class="missing-tags">';
    missing.forEach(s=>h+='<span class="missing-tag">✕ '+s+'</span>');
    h+='</div>';
    h+='<div class="flagship-ref">플래그십 출시가 <span>'+flagship.price+'만원</span>'+(disc>0?' → 할인가 '+discPrice(flagship.price)+'만원':'')+'</div>';
    // 가격 비교 바
    const ratio=Math.round((product.price/flagship.price)*100);
    h+='<div class="compare-bar-wrap"><div class="compare-bar-label"><span>이 모델 가격 비율</span><span>'+ratio+'%</span></div>';
    h+='<div class="compare-bar-track"><div class="compare-bar-fill" style="width:'+ratio+'%;background:'+(tier==='recommended'?'#059669':tier==='budget'?'#6b7280':'#1428A0')+'"></div></div></div>';
    h+='</div>';
  }else if(isFlagshipModel){
    h+='<div class="missing-section" style="border-color:transparent"><div style="font-size:10px;color:#92400E;font-weight:700">🏆 카테고리 최고 사양 — 빠진 기능 없음</div></div>';
  }

  return h;
}

function switchTier(catId,idx){
  [0,1,2].forEach(i=>{
    document.getElementById('tc_'+catId+'_'+i).classList.toggle('hidden',i!==idx);
    const tab=document.getElementById('tab_'+catId+'_'+i);
    tab.classList.toggle('active',i===idx);
    if(i===0){tab.classList.toggle('gold',true);tab.classList.toggle('green',false);}
    else if(i===1){tab.classList.toggle('green',true);tab.classList.toggle('gold',false);}
    else{tab.classList.toggle('gold',false);tab.classList.toggle('green',false);}
  });
}

function resetAll(){
  state={mode:null,pyeong:null,selected:new Set(),budget:0,discount:0};
  activeTiers={};
  ['btn-apt','btn-budget'].forEach(id=>document.getElementById(id).classList.remove('active'));
  document.getElementById('budget-input').value='';
  document.getElementById('discount-slider').value=0;
  document.getElementById('discount-val').textContent='0%';
  ['sec-apt','sec-cat','sec-budget','sec-result'].forEach(id=>hide(id));
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
